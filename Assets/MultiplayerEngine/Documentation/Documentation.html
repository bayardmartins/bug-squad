    <script type="text/markdown" data-category="Multiplayer Engine" id="doc-intro" data-title="Introduction">
# 🎮 Survival Multiplayer Pro

**The Ultimate Foundation for Co-op Survival Games**

**Survival Multiplayer Pro** is a robust, production-ready multiplayer template built exclusively for Unity. Driven by a deep, modular architecture, it provides all the complex systems needed to build a fully-featured survival game—from structural building integrity and IK-driven combat to seamless Steam and Unity Services integration.

Built from the ground up on **Unity Netcode for GameObjects (NGO)**, every script and system has been designed with multiplayer synchronization and cooperative gameplay in mind.

---

## ⚡ Multiplayer Engine & Lobby System
Located in `Assets/MultiplayerEngine/Lobby/Runtime`, our core networking stack handles the heavy lifting of multiplayer connectivity. Switch between backends with zero code changes.

- **Steam Integration:** Full support for Steam Lobbies, Steamworks authentication, and Steam Relay (SteamNetworkingSockets).
- **Unity Services:** Fully integrated with Unity Authentication, Unity Relay, and Unity Lobbies.
- **Lobby & Matchmaking:** Create, join, and browse lobbies seamlessly.
- **Voice Chat:** Built-in Vivox voice integration for proximity and team communication.

---

## 🌲 Core Survival Systems
Found under `Assets/MultiplayerEngine/Survival/Scripts`, the survival mechanics are split into isolated, event-driven modules that can be easily customized or expanded:

- **Advanced Build System:** Includes a fully networked `BuildManager` with structural integrity calculations (`BuildSupportGraph`). Features precise piece snapping (`SnapPointRegistry`) and a dedicated `BuildHammer` tool for intuitive base construction.
- **Inventory & Equipment:** A robust `InventoryManager` handles items, while the `Equipment` system manages what the player holds. Features dynamic **Inverse Kinematics (IK)** for accurate hand placement and a deep `Combat` module for weapons.
- **Player Stats & Vitals:** The `PlayerStats` module fully replicates complex player vitals including health, stamina, hunger, and thirst.
- **Resource & Crafting Systems:** Networked `ResourceSystem` for chopping trees and mining rocks, fully synced across all clients. The `CraftingSystem` utilizes ScriptableObjects for data-driven, easily modifiable crafting recipes.
- **Character Controller:** A responsive, network-synced Third-Person Controller with smooth movement, jumping, and camera handling.
- **Interaction System:** A modular interaction system allowing players to seamlessly interact with dropped items, chests, doors, and crafting stations.

---

## 🛠️ Developer-Centric Architecture
- **Clean Separation:** Lobby, Core, and Survival mechanics are cleanly decoupled.
- **Event-Driven:** Subscribe to system events rather than tightly coupling code.
- **ScriptableObject Data:** Items, weapons, build pieces, and recipes are entirely data-driven, making it easy for game designers to iterate without touching code.
- **Highly Documented:** Built to be understood, extended, and modified to fit your specific vision.

# 🚀 Getting Started Guide

> **💡 Overview:** This guide walks you through setting up Multiplayer Engine Lite from scratch — backend selection, cloud configuration, lobby setup, network managers, and game scene character/weapon setup.

---

## 1. 🔧 Backend Selection

The asset supports two backend services. **Only one can be active at a time.**

### How to Switch Backend

**Menu:** `Tools > Multiplayer Engine > Switch Backend`

This opens the **Welcome Window** on the Backend Selection page.

| Backend | When to Use |
| :--- | :--- |
| **Unity Services** | Cross-platform, Unity's cloud infrastructure (Relay, Lobby, Friends, Vivox, Cloud Save). |
| **Steam** | PC-only via Steamworks.NET. Uses Steam's networking, friends, and voice. |

### What Happens When You Click

-   **Unity Services:** Installs `com.unity.services.multiplayer`, `com.unity.services.friends`, `com.unity.services.authentication`, `com.unity.services.cloudsave`, `com.unity.services.vivox`. Adds `UNITY_SERVICES` define.
-   **Steam:** Installs `Steamworks.NET`. Adds `STEAM_SERVICES` define.

---

## 2. ☁️ Cloud Configuration

### Unity Services Setup

1.  Go to [Unity Dashboard](https://dashboard.unity3d.com/).
2.  Create or select your project.
3.  Enable these services:
    -   **Authentication**
    -   **Lobby**
    -   **Relay**
    -   **Cloud Save**
    -   **Vivox** (for voice chat)
    -   **Friends**
4.  In Unity Editor: `Edit > Project Settings > Services` → Link your project.

### Steam Setup

1.  Go to [Steamworks Partner](https://partner.steamgames.com/).
2.  Create your app and get your **App ID**.
3.  Create a file named `steam_appid.txt` in your project's root folder (next to Assets).
4.  Put ONLY your App ID number inside (e.g., `480` for testing).
5.  Ensure Steam client is running when testing.

---

## 3. 🏛️ Main Menu Scene Setup

### Required Manager Prefabs

Drag these from `Prefabs/Managers/` into your scene:

| Prefab | Script | Required |
| :--- | :--- | :--- |
| `AuthenticationManager.prefab` | `AuthenticationManager.cs` | ✅ Yes |
| `LobbyManager.prefab` | `LobbyManager.cs` | ✅ Yes |
| `ProfileManager.prefab` | `PlayerProfileManager.cs` | ✅ Yes |
| `SessionManager.prefab` | `SessionManager.cs` | ✅ Yes |
| `FriendsManager.prefab` | `FriendsManager.cs` | ⚪ Optional |
| `VoiceManager.prefab` | `VoiceManager.cs` | ⚪ Optional |

### Required UI Prefabs

Drag these from `Prefabs/UI/` into a Canvas:

| Prefab | Script | Required |
| :--- | :--- | :--- |
| `AuthenticationUI.prefab` | `AuthenticationUI.cs`, `SignInUI.cs`, `SignUpUI.cs`, `SetPlayerProfileUI.cs` | ✅ Yes |
| `HomeScreenUI.prefab` | `MainMenuUI.cs`, `MultiplayerMenuUI.cs` | ✅ Yes |
| `LobbyUI.prefab` | `LobbyUI.cs`, `LobbyCharacterSelection.cs` | ✅ Yes |
| `PlayerProfileUI.prefab` | `PlayerProfileUI.cs`, `EditPlayerProfileUI.cs` | ⚪ Optional |
| `FriendsPanel.prefab` | `FriendsUI.cs`, `AddFriends.cs` | ⚪ Optional |

### Required Utility Scripts

| Script | Purpose | Required |
| :--- | :--- | :--- |
| `LoadingScreen.cs` | Shows loading progress during transitions. | ✅ Yes |
| `LoadingIcon.cs` | Animated loading spinner. | ⚪ Optional |

---

## 4. 🌐 Network Managers

### For Unity Services

| Component | Required |
| :--- | :--- |
| `NetworkManager` (Netcode for GameObjects) | ✅ Yes |
| `UnityTransport` | ✅ Yes |

### For Steam

| Prefab/Component | Script | Required |
| :--- | :--- | :--- |
| `SteamManager.prefab` (from `Integrations/Steam/`) | `SteamManager.cs` | ✅ Yes |
| `SteamNetworkingSocketsTransport.cs` | Attach to NetworkManager GameObject | ✅ Yes |

### NetworkManager Setup

1.  Create an empty GameObject named `NetworkManager`.
2.  Add `NetworkManager` component.
3.  Add transport:
    -   Unity: Add `UnityTransport` component.
    -   Steam: Add `SteamNetworkingSocketsTransport` component.
4.  Register all networked prefabs in `NetworkManager > NetworkPrefabs`.

---

## 5. 🎮 Game Scene Setup

### Required Scene Components

| Script | Purpose | Required |
| :--- | :--- | :--- |
| `SpawnManager.cs` | Spawns player characters at spawn points. | ✅ Yes |

**SpawnManager Setup:**
1.  Create an empty GameObject.
2.  Add `SpawnManager` component.
3.  Create empty child GameObjects at spawn positions.
4.  Assign them to `SpawnManager > Spawn Points` array.

---

## 6. 🧍 Character Prefab Setup

### Required Components

| Component/Script | Purpose | Required |
| :--- | :--- | :--- |
| `NetworkObject` | Netcode identity. | ✅ Yes |
| `PlayerController.cs` | Handles interaction, object pickup, HUD initialization. | ✅ Yes |
| `ThirdPersonController.cs` | Movement, jumping, camera control. | ✅ Yes |
| `InputManager` (or PlayerInput) | Handles input. | ✅ Yes |
| `ClientNetworkTransform.cs` | Syncs position/rotation (client authority). | ✅ Yes |
| `ClientNetworkAnimator.cs` | Syncs animations (client authority). | ✅ Yes |
| `Animator` | Humanoid animator controller. | ✅ Yes |
| `CharacterController` | Unity's built-in character movement. | ✅ Yes |
| `Cinemachine` (Virtual Camera) | Third-person camera follow. | ✅ Yes |

### Optional Components

| Component/Script | Purpose | Required |
| :--- | :--- | :--- |
| `HealthManager.cs` | Health system, damage, death. | ⚪ Optional |
| `WeaponManager.cs` | Weapon handling, aiming, IK. | ⚪ Optional |
| `PlayerStatsUI.cs` | Floating name/health above player. | ⚪ Optional |

### Character Prefab Hierarchy Example
```
PlayerCharacter (NetworkObject, PlayerController, ThirdPersonController, InputManager, CharacterController, ClientNetworkTransform)
├── Model (Animator, ClientNetworkAnimator)
│   ├── Armature
│   │   ├── Hips
│   │   └── ... (bones)
│   └── Mesh
├── CameraRoot (empty transform for camera follow)
├── GroundCheck (empty transform at feet)
└── PlayerStatsUI (Canvas with name/health display)
```

---

## 7. 🔫 Weapon System Setup

### Weapon Manager

| Script | Purpose | Required |
| :--- | :--- | :--- |
| `WeaponManager.cs` | Main weapon controller on character. | ✅ Yes (if using weapons) |
| `WeaponIk` (ScriptableObject) | Stores IK data for each weapon. | ✅ Yes (if using weapons) |

### Shooter Weapon (Gun)

| Script | Purpose | Required |
| :--- | :--- | :--- |
| `ShooterWeapon.cs` | Gun logic (shooting, ammo, raycast). | ✅ Yes |
| `Pickable.cs` | Makes weapon pickable from ground. | ✅ Yes |

**ShooterWeapon Setup:**
1.  Create weapon prefab with `NetworkObject`.
2.  Add `ShooterWeapon` component.
3.  Add `Pickable` component.
4.  Assign:
    -   `GunModel` (the visual mesh/transform)
    -   `RightHand`, `LeftHand` (IK targets)
    -   `RightHandHint`, `LeftHandHint` (elbow hints)
    -   `Muzzle` (spawn point for bullets/VFX)

### Melee Weapon

| Script | Purpose | Required |
| :--- | :--- | :--- |
| `MeleeWeapon.cs` | Melee attack logic. | ✅ Yes |
| `Pickable.cs` | Makes weapon pickable. | ✅ Yes |

### WeaponIk ScriptableObject

**Location:** `ScriptableObjects/Weapons/CharacterWeaponIK.asset`

This stores IK positions for each weapon. Each entry has:
-   `WeaponId` — matches `ShooterWeapon.WeaponId`
-   `holdTransform` — weapon position when not aiming
-   `aimTransform` — weapon position when aiming
-   `rightHandIK`, `leftHandIK` — hand positions when holding
-   `rightHandAimIK`, `leftHandAimIK` — hand positions when aiming

---

## 8. 🎯 Interaction System

### Interactable Objects

| Script | Purpose | Required |
| :--- | :--- | :--- |
| `Interactable.cs` | Base class for any interactable object. | ✅ Yes |
| `Pickable.cs` | Objects that can be picked up. | ⚪ Optional |
| `Door.cs` | Networked door that opens/closes. | ⚪ Optional |
| `DoorSwitch.cs` | Switch that triggers a door. | ⚪ Optional |

**Interactable Setup:**
1.  Add a Collider (trigger or non-trigger).
2.  Add `Interactable` (or derived script like `Pickable`, `Door`).
3.  Assign UI tooltip prefab if desired.

---

## 9. 📺 Gameplay UI

### GameplayUIManager

| Script | Purpose | Required |
| :--- | :--- | :--- |
| `GameplayUIManager.cs` | Manages in-game HUD (health bar, weapon display). | ⚪ Optional |

**Located in:** `Runtime/Gameplay/UI/`

---

## 10. 📦 CharacterData ScriptableObject

**Location:** `ScriptableObjects/Characters/`

| Field | Purpose |
| :--- | :--- |
| `CharacterId` | Unique ID for this character. |
| `CharacterName` | Display name. |
| `CharacterIcon` | Sprite for UI/lobby. |
| `CharacterPrefab` | Networked prefab to spawn in-game. |
| `CharacterLobbyPrefab` | Preview prefab for lobby selection. |
| `Stealth`, `Mobility` | Stats for character selection UI. |

### Adding a New Character
1.  Create a new `CharacterData` asset (`Create > Multiplayer Engine > Character Data`).
2.  Fill in all fields.
3.  Add the networked prefab to `NetworkManager > NetworkPrefabs`.
4.  Add the `CharacterData` to `PlayerProfileManager > Character Data` list.

---

## 11. 📐 Setup Checklist

### Main Menu Scene
- [ ] All Manager prefabs in scene
- [ ] All UI prefabs in Canvas
- [ ] `LoadingScreen` in scene
- [ ] NetworkManager with correct transport
- [ ] (Steam only) `SteamManager` prefab in scene

### Game Scene
- [ ] `SpawnManager` with spawn points assigned
- [ ] NetworkManager (will persist from menu via DontDestroyOnLoad)

### Character Prefab
- [ ] `NetworkObject` attached
- [ ] `PlayerController`, `ThirdPersonController` attached
- [ ] `ClientNetworkTransform`, `ClientNetworkAnimator` attached
- [ ] Registered in `NetworkManager > NetworkPrefabs`

### Weapon Prefab
- [ ] `NetworkObject` attached
- [ ] `ShooterWeapon` or `MeleeWeapon` attached
- [ ] `Pickable` attached
- [ ] Entry in `WeaponIk` ScriptableObject
- [ ] Registered in `NetworkManager > NetworkPrefabs`

---

## 12. 📐 Visual Flow

```mermaid
graph TD
    Start[Open Unity Project] --> Backend[Switch Backend Tool]
    
    Backend --> UnityCloud[Unity: Enable Services in Dashboard]
    Backend --> SteamID[Steam: Add steam_appid.txt]
    
    UnityCloud --> MainMenu[Setup Main Menu Scene]
    SteamID --> MainMenu
    
    MainMenu --> Managers[Add Manager Prefabs]
    MainMenu --> UI[Add UI Prefabs]
    MainMenu --> Network[Setup NetworkManager + Transport]
    
    Network --> GameScene[Setup Game Scene]
    GameScene --> Spawner[Add SpawnManager + Spawn Points]
    
    Spawner --> Character[Create Character Prefab]

    Character --> Register[Register in NetworkManager]
    
    Register --> Weapon[Create Weapon Prefabs]

    <script type="text/markdown" data-category="Multiplayer Engine" id="doc-auth" data-title="Authentication">
# 🔐 Authentication System

> **💡 Overview:** The **Authentication System** handles user sign-in, sign-up, and profile setup. It supports both **Unity Services** (email/password) and **Steam** (automatic) authentication flows.

---

## 1. 🏗️ Overview

The system relies on a few key components to manage user authentication:

-   **AuthenticationUI:** The visual interface for auth screens.
-   **AuthenticationManager:** The logic handling auth flow and service calls.
-   **SignInUI:** Handles the sign-in form (Unity only).
-   **SignUpUI:** Handles the sign-up form (Unity only).
-   **SetPlayerProfileUI:** Profile setup after first login (Unity only).

---

## 2. 🖥️ Authentication UI (`AuthenticationUI.cs`)

**Script:** `AuthenticationUI.cs`

This is the main auth container. It appears automatically on game start.

### 🖱️ User Interactions

| UI Element | Action | Platform |
| :--- | :--- | :--- |
| **Retry Button** | Retries authentication after an error. | All |
| **Switch to Sign Up** | Navigates to the sign-up form. | **Unity Only** |
| **Switch to Sign In** | Navigates to the sign-in form. | **Unity Only** |

### 📱 Visual Elements

-   **Loading Panel:** Spinner with "Signing in..." message.
-   **Error Panel:** Displays auth errors with retry option.
-   **Sign In Panel:** Email/password login form.
-   **Sign Up Panel:** Account creation form.
-   **Profile Setup Panel:** First-time profile configuration.

---

## 3. 👤 Sign In UI (`SignInUI.cs`)

**Script:** `SignInUI.cs`

Handles the email/password sign-in flow. Only active in Unity Services builds.

### 🖱️ Interactions

| UI Element | Action | Validation |
| :--- | :--- | :--- |
| **Email Field** | Enter email address. | Required |
| **Password Field** | Enter password. | Min 8 characters |
| **Sign In Button** | Submits credentials. | Enabled when valid |
| **Google Button** | Social sign-in (placeholder). | — |
| **Apple Button** | Social sign-in (placeholder). | — |
| **Steam Button** | Social sign-in (placeholder). | — |
| **Switch to Sign Up** | Navigate to registration. | — |

### 📱 Visual Elements
-   **Error Text:** Shows validation or server errors.
-   **Input Fields:** Email and password with validation.

---

## 4. 📝 Sign Up UI (`SignUpUI.cs`)

**Script:** `SignUpUI.cs`

Handles new account registration. Only active in Unity Services builds.

### 🖱️ Interactions

| UI Element | Action | Validation |
| :--- | :--- | :--- |
| **Email Field** | Enter email address. | Required |
| **Password Field** | Create password. | Min 8 characters |
| **Confirm Password** | Re-enter password. | Must match |
| **Sign Up Button** | Creates the account. | Enabled when valid |
| **Switch to Sign In** | Navigate to login. | — |

### 📱 Visual Elements
-   **Error Text:** Shows "Email already registered" or other errors.
-   **Social Buttons:** Google, Apple, Steam (placeholders).

---

## 5. 🎭 Profile Setup UI (`SetPlayerProfileUI.cs`)

**Script:** `SetPlayerProfileUI.cs`

First-time profile configuration after sign-up. Only active in Unity Services builds.

### 🖱️ Flow
1.  **Select Avatar:** Click an icon in the grid.
2.  **Enter Name:** Type a display name (3-20 characters).
3.  **Save:** Submit to complete profile setup.

### 📱 Visual Elements
-   **Avatar Grid:** Clickable profile icons.
-   **Preview Icon:** Shows selected avatar.
-   **Name Input:** Display name field with validation.
-   **Error Text:** Shows save errors.

---

## 6. 🧩 Authentication Manager (`AuthenticationManager.cs`)

**Script:** `AuthenticationManager.cs`

This is the non-visual brain. It coordinates the entire auth lifecycle.

### Core Concepts
-   **Singleton:** Access anywhere via `AuthenticationManager.Instance`.
-   **Provider Pattern:** Uses `IAuthentication` interface for Unity/Steam.
-   **Events:** Fires events that UI subscribes to.

### Authentication Flow
1.  **Initialize:** Set up the auth provider.
2.  **Auto Sign-In:** Attempt cached session login.
3.  **Manual Sign-In:** (Unity only) Show login UI if needed.
4.  **Profile Check:** Verify player profile exists.
5.  **Complete:** Fire `OnAuthCompleted` event.

### Events API
| Event | Description |
| :--- | :--- |
| `OnAuthStarted` | Auth flow has begun. |
| `OnAuthCompleted` | Auth succeeded, player is ready. |
| `OnAuthError` | Auth failed with an error message. |
| `OnShowSignInUI` | (Unity) Show the sign-in form. |
| `OnShowProfileSetupUI` | (Unity) Show profile setup. |
| `OnSignInCompleted` | Sign-in attempt finished (bool success). |
| `OnSignUpCompleted` | Sign-up attempt finished (bool success). |
| `OnSignOutCompleted` | Sign-out finished (bool success). |
| `OnProfileSetupCompleted` | Profile check finished (bool exists). |

### Public Methods
| Method | Description |
| :--- | :--- |
| `SignInAsync(email, password, rememberMe)` | Sign in with credentials. |
| `SignUpAsync(email, password, rememberMe)` | Create new account. |
| `SignOutAsync()` | Log out current user. |
| `RetryAuthAsync()` | Retry the full auth flow. |
| `CheckForPlayerProfile()` | Verify profile exists. |

---

## 7. 🔌 Interface (`IAuthentication.cs`)

**Script:** `IAuthentication.cs`

Defines the contract that all auth providers must implement.

### Required Methods
| Method | Description |
| :--- | :--- |
| `InitializeAsync()` | Initialize the auth service. |
| `AutoSignInAsync()` | Attempt cached session login. |
| `SignInAsync(email, password, rememberMe)` | Manual sign-in. |
| `SignUpAsync(email, password, rememberMe)` | Create account. |
| `SignInWithCodeAsync(authCode)` | Sign in with auth code. |
| `SignOutAsync()` | Log out user. |

---

## 8. 🛠️ How to Extend

### Add "Remember Me" Toggle
1.  **UI:** Add a Toggle to `SignInUI` canvas.
2.  **Logic:** In `OnSignInClicked()`, pass toggle value to `SignInAsync()`.
3.  **Data:** The `rememberMe` parameter is already supported.

### Add Password Reset
1.  **UI:** Add "Forgot Password" button to `SignInUI`.
2.  **Logic:** Create new method in `IAuthentication` interface.
3.  **Provider:** Implement in `UnityAuthentication.cs`.

### Add Social Login (Google/Apple)
1.  **Provider:** Implement the placeholder methods in `SignInUI.cs`.
2.  **Service:** Configure OAuth in Unity Dashboard.
3.  **Logic:** Call the appropriate Unity Authentication SDK methods.

---

## 9. 📐 Visual Flow

```mermaid
graph TD
    Start[Game Start] --> Init[Initialize Provider]
    
    Init --> Auto[Auto Sign-In]
    
    Auto -->|Success| Profile{Has Profile?}
    Auto -->|Fail - Steam| Error[Show Error]
    Auto -->|Fail - Unity| SignIn[Show Sign In UI]
    
    SignIn --> Manual[Manual Sign-In/Up]
    Manual -->|Success| Profile
    Manual -->|Fail| SignIn
    
    Profile -->|Yes| Complete[Auth Complete]
    Profile -->|No - Unity| Setup[Profile Setup UI]
    Profile -->|No - Steam| Complete
    
    Setup --> Complete
    
    Error -->|Retry| Init
    
    Complete --> Menu[Main Menu]
```

---

## 10. 🎮 Platform Differences

| Feature | Unity Services | Steam |
| :--- | :--- | :--- |
| **Auto Sign-In** | ✅ Cached session | ✅ Steam client |
| **Manual Sign-In** | ✅ Email/password | ❌ Not supported |
| **Sign Up** | ✅ Full flow | ❌ Steam handles |
| **Profile Setup** | ✅ Manual | ✅ Auto from Steam |
| **Social Login** | 🔜 Planned | ❌ N/A |

    </script>

        data-title="Main Menu & Multiplayer">
# 🎮 Main Menu & Multiplayer System

> **💡 Overview:** This document covers the Main Menu and Multiplayer Menu UI, including creating and joining lobbies.

---

## 1. 🏗️ User Flow Overview

1.  **Start:** The game launches and authenticates the user.
2.  **Main Menu:** The user arrives at the Main Menu.
3.  **Multiplayer:** Clicking "Multiplayer" opens the Multiplayer Menu.
4.  **Selection:** The user chooses to **Create a Lobby** or **Join a Lobby**.
5.  **Game:** Upon success, the user is transferred to the Game Lobby screen.

---

## 2. 🏠 Main Menu UI (`MainMenuUI.cs`)

**Script:** `MainMenuUI.cs`

This is the first screen the user sees after logging in. It serves as the central hub for navigation.

### 🖱️ Interactions
-   **Multiplayer Button:** Hides the main menu buttons and reveals the **Multiplayer Menu**.
-   **Settings Button:** *(Placeholder)* Intended to open the Options menu.
-   **Exit Button:** Quits the application.

### 📱 Visual Elements
-   **Profile Card:** Displays the local player's Name and Avatar (top/corner).
-   **Main Group:** A container holding the primary navigation buttons.

---

## 3. 🌐 Multiplayer Menu UI (`MultiplayerMenuUI.cs`)

**Script:** `MultiplayerMenuUI.cs`

This menu handles the setup before entering a match. It is divided into two distinct workflows.

### 🅰️ Create Lobby Interaction
1.  **Click "Create Lobby":** Switches the view to the Creation Panel.
2.  **Configure Settings:**
    -   **Lobby Name:** Type a custom name for the room.
    -   **Max Players:** Click to cycle through player limits (e.g., 2, 4, 8).
    -   **Game Mode:** Click to cycle modes (FreeForAll, TDM, CTF).
    -   **Visibility:**
        -   *Public:* Anyone can find it.
        -   *Private:* Invite only.
        -   *Locked:* Public but requires a password.
3.  **Confirm:** Click **"Create"** to start the session.

### 🅱️ Join Lobby Interaction
1.  **Click "Find Lobby":** Switches the view to the Browser Panel.
2.  **Browse List:** A list of available public lobbies appears.
    -   **Refresh:** Click to reload the list.
    -   **Join:** Click a lobby item to enter.
3.  **Join by Code:** Enter a unique code in the input field and click "Join" (useful for Private lobbies).
4.  **Password Prompt:** If joining a *Locked* lobby, a popup appears asking for the password.

---

## 4. 📐 Visual Interaction Diagram

```mermaid
graph TD
    Start[Start Game] --> Main[Main Menu]
    Main -->|Click Multiplayer| Split{Multiplayer Menu}
    
    Split -->|Option A| Create[Create Panel]
    Split -->|Option B| Join[Join Panel]
    
    Create -- Set Name, Mode, Privacy --> Submit[Click Create]
    
    Join -- Browse List --> Select[Select Lobby]
    Join -- Enter Code --> Direct[Join by Code]
    
    Submit --> Room[Enter Lobby Room]
    Select --> Room
    Direct --> Room
```

    <script type="text/markdown" data-category="Multiplayer Engine" id="doc-profiles" data-title="Player Profiles">
# 👤 Player Profile System

> **💡 Overview:** This document covers the **Player Profile System**, including managing player data (name, avatar, stats), viewing profiles, and editing profile information.

---

## 1. 🏗️ Overview

The Player Profile System consists of:
-   **PlayerProfileManager:** Backend logic for getting/setting profile data.
-   **PlayerProfileUI:** Popup to view any player's profile.
-   **EditPlayerProfileUI:** Sub-panel to edit your own profile.
-   **PlayerProfileCard:** Small display card (e.g., in Main Menu header).
-   **SetPlayerProfileUI:** Initial profile setup after first sign-up.

---

## 2. 🧩 Player Profile Manager (`PlayerProfileManager.cs`)

**Script:** `PlayerProfileManager.cs`

The backend singleton for all profile operations.

### Core Concepts
-   **Singleton:** Accessed via `PlayerProfileManager.Instance`.
-   **Platform Agnostic:** Uses `IPlayerProfile` interface (`UnityPlayerProfile` or `SteamPlayerProfile`).
-   **Character Data:** Stores the list of available characters for selection.
-   **Profile Icons:** Stores the list of available avatar icons.

### Properties

| Property | Type | Description |
| :--- | :--- | :--- |
| `LocalPlayerStats` | `PlayerStats` | The local player's cached profile data. |
| `PlayerIcons` | `List<Sprite>` | Available avatar icons. |
| `CharacterData` | `List<CharacterData>` | Available playable characters. |

### Events API

| Event | Parameter | Description |
| :--- | :--- | :--- |
| `OnLocalPlayerUpdated` | `void` | Fired when the local player's profile is refreshed. |

### Key Methods

| Method | Returns | Description |
| :--- | :--- | :--- |
| `GetPlayerStatsAsync(playerId)` | `Task<PlayerStats>` | Gets stats for any player. If null, returns local. |
| `GetLocalPlayerStatsAsync(customStats)` | `Task<PlayerStats>` | Gets local player stats with custom keys. |
| `GetRemotePlayerStatsAsync(playerId, customStats)` | `Task<PlayerStats>` | Gets another player's stats. |
| `UpdatePlayerDataAsync(displayName, avatarId)` | `Task<(bool, bool)>` | Updates name and/or avatar. Returns success for each. |
| `SetCustomStatAsync(key, value)` | `Task<bool>` | Sets a custom statistic (e.g., "gamesPlayed"). |
| `GetIconById(iconId)` | `Sprite` | Gets a specific avatar icon by its ID. |

---

## 3. 🖥️ Player Profile UI (`PlayerProfileUI.cs`)

**Script:** `PlayerProfileUI.cs`

A popup panel that displays detailed profile information.

### 🖱️ User Interactions

| UI Element | Action | Visibility |
| :--- | :--- | :--- |
| **Edit Profile Button** | Opens the edit panel. | Local player only |
| **Close Button** | Closes the profile popup. | Always |

### 📱 Visual Elements

-   **Player Icon:** Large avatar display.
-   **Display Name:** The player's name.
-   **Description:** Bio/about text (custom stat).
-   **Games Played:** Count of games (custom stat).

### Key Methods

| Method | Description |
| :--- | :--- |
| `ShowPlayerProfileUI()` | Opens popup showing the local player's profile. |
| `ShowFriendProfileUI(friendId)` | Opens popup showing a friend's profile. |
| `HideProfilePanel()` | Closes the popup. |
| `RefreshLocalProfile()` | Reloads the local player's data. |

---

## 4. ✏️ Edit Player Profile UI (`EditPlayerProfileUI.cs`)

**Script:** `EditPlayerProfileUI.cs`

A sub-panel for editing your own profile.

### 🖱️ User Interactions

| UI Element | Action |
| :--- | :--- |
| **Display Name Input** | Type a new name. |
| **Avatar Selection** | Click one of the available icons. |
| **Save Button** | Saves changes to the server. |
| **Close Button** | Closes without saving. |

### Behavior
-   On open, fields are populated with current values.
-   On save, `PlayerProfileManager.UpdatePlayerDataAsync()` is called.
-   If successful, the profile UI refreshes to show updated data.

---

## 5. 🏷️ Player Profile Card (`PlayerProfileCard.cs`)

**Script:** `PlayerProfileCard.cs`

A small, always-visible card (e.g., in the Main Menu header).

### 📱 Visual Elements

-   **Small Avatar:** Thumbnail of your profile icon.
-   **Player Name:** Your display name.

### Behavior
-   Subscribes to `PlayerProfileManager.OnLocalPlayerUpdated`.
-   Auto-updates when profile changes.
-   Clicking it may open the full `PlayerProfileUI`.

---

## 6. 📝 Initial Profile Setup (`SetPlayerProfileUI.cs`)

**Script:** `SetPlayerProfileUI.cs`

Shown **once** after a new user signs up (Unity Services).

### 🖱️ User Interactions

1.  **Enter Display Name:** Must meet minimum length.
2.  **Select Avatar:** Choose from available icons.
3.  **Confirm:** Saves the profile and proceeds to Main Menu.

### Behavior
-   Triggered by `AuthenticationManager.OnShowProfileSetup` event.
-   After confirmation, fires `AuthenticationManager.OnProfileSetupCompleted`.

---

## 7. 📦 Data Structures

### `PlayerStats`
```csharp
public class PlayerStats
{
    public string PlayerId;
    public string DisplayName;
    public Sprite PlayerAvatar;
    public Dictionary<string, string> CustomStats; // e.g., "gamesPlayed", "description"
}
```

### `CharacterData` (ScriptableObject)
```csharp
public class CharacterData : ScriptableObject
{
    public string CharacterId;
    public string CharacterName;
    public Sprite CharacterIcon;
    public GameObject CharacterPrefab;
    public GameObject CharacterLobbyPrefab;
    public float Stealth;
    public float Mobility;
}
```

---

## 8. 🛠️ How to Extend

### Adding a New Custom Stat (e.g., "Wins")
1.  **Set the stat** when a game ends:
    ```csharp
    await PlayerProfileManager.Instance.SetCustomStatAsync("wins", "10");
    ```
2.  **Retrieve it** when loading profiles by adding "wins" to the `customStatRequest` list:
    ```csharp
    var stats = await PlayerProfileManager.Instance.GetPlayerStatsAsync(playerId, new List<string> { "wins" });
    int wins = int.Parse(stats.CustomStats["wins"]);
    ```
3.  **Display it** in `PlayerProfileUI` by adding a new `TMP_Text` field.

### Adding a "Bio" Field to Edit Profile
1.  **UI:** Add a `TMP_InputField` for the bio.
2.  **Logic:** On save, call:
    ```csharp
    await PlayerProfileManager.Instance.SetCustomStatAsync("description", bioInput.text);
    ```

### Adding New Avatar Icons
1.  **Inspector:** In `PlayerProfileManager` prefab, add sprites to the `profileIcons` list.
2.  The icons will automatically appear in `EditPlayerProfileUI` and `SetPlayerProfileUI`.

---

# 🏛️ Lobby System

> **💡 Overview:** The **Lobby System** is where players gather before a match starts. It handles player listing, game settings configuration (Host only), character selection, and game initiation.

---

## 1. 🏗️ Overview

The system relies on a few key components to manage the pre-game state:

-   **LobbyUI:** The visual interface you see.
-   **LobbyManager:** The logic handling network/service calls.
-   **LobbyPlayerItem:** Represents a single player in the list.
-   **CharacterSelection:** Handles the visual character picking.

---

## 2. 🖥️ Lobby UI (`LobbyUI.cs`)

**Script:** `LobbyUI.cs`

This is the main screen. It appears automatically when you create or join a room.

### 🖱️ User Interactions

| UI Element | Action | Who Can Use |
| :--- | :--- | :--- |
| **Leave Button** | Exits the lobby and returns to Main Menu. | Everyone |
| **Start Game Button** | Begins the match (loads game scene). | **Host Only** |
| **Ready Button** | Marks the player as "Ready". | **Non-Hosts** |
| **Privacy Button** | Toggles between Public/Private. | **Host Only** |
| **Game Mode Button** | Cycles through game modes. | **Host Only** |
| **Copy Code Button** | Copies the Join Code to clipboard. | Everyone |

### 📱 Visual Elements

-   **Lobby Name:** Displays the room name.
-   **Join Code:** Share this code join Private lobbies.
-   **Player Count:** Shows current vs max players (e.g., 2/8).
-   **Player List:** Scrollable list of connected users.

---

## 3. 👤 Player Item (`LobbyPlayerItem.cs`)

**Script:** `LobbyPlayerItem.cs`

Each entry in the player list is one of these.

### 🖱️ Interactions
-   **Kick Button:** (Host Only) Removes a specific player from the lobby.

### 📱 Visual Elements
-   **Player Name:** Drawn from the user's profile.
-   **Character Icon:** Shows which character they picked.
-   **Ready Status:** Green = Ready, Yellow = Waiting.
-   **Host Icon:** A crown appears next to the lobby owner.

### 🎙️ Voice Controls (Remote Players Only)
If voice chat is active, you see these controls for *other* players:
-   **Volume Slider:** Adjust volume for this specific person.
-   **Mute Button:** Silence this person locally.
-   **Speaking Indicator:** Glows when they talk.

---

## 4. 🎭 Character Selection (`LobbyCharacterSelection.cs`)

**Script:** `LobbyCharacterSelection.cs`

### 🖱️ Flow
1.  **Select:** Click a character button in the grid.
2.  **Preview:** The 3D model appears in the preview spot.
3.  **Sync:** Note that your selection updates for everyone else in the lobby too.

### 📱 Visuals
-   **Stats:** Sliders update to show Stealth/Mobility for the selected hero.
-   **Name:** Updates to the character's name.

---

## 5. 🧩 Lobby Manager (`LobbyManager.cs`)

**Script:** `LobbyManager.cs`

This is the non-visual brain. It coordinates everything with Unity Services or Steam.

### Core Concepts
-   **Singleton:** You can access it anywhere via `LobbyManager.Instance`.
-   **Events:** It fires specific events that the UI listens to.

### Events API
| Event | Description |
| :--- | :--- |
| `OnLobbyCreated` | You created a room. |
| `OnLobbyJoined` | You joined a room. |
| `OnLobbyLeft` | You left/disconnected. |
| `OnLobbyUpdated` | Room settings (Mode, Privacy) changed. |
| `OnLobbyPlayerDataUpdated` | A player changed ready state or character. |
| `OnGameStarted` | Host started the match. |

### Data Structures
-   **`LobbyData`**: Holds Room Name, Join Code, Host ID, Max Players, etc.
-   **`PlayerData`**: Holds Name, Character ID, Ready State, IsHost.

---

## 6. 🛠️ How to Extend

### Add a "Map Selection" Setting
1.  **UI:** Add a button to `LobbyUI` canvas.
2.  **Logic:** In `LobbyUI.cs`, add a listener to that button. Use `LobbyManager.Instance.UpdateLobbyData` to send the new Map ID.
3.  **Data:** Update the `LobbyDataKeys` enum to include `MapId`.

### Add "Player Level" Display
1.  **UI:** Add a Text field to `LobbyPlayerItem` prefab.
2.  **Logic:** In `LobbyPlayerItem.UpdatePlayer`, read the level from `playerData.Data`.
3.  **Data:** Ensure `PlayerProfileManager` sends the level during join.

graph TD

    Settings -->|Start Game| Game[Game Scene]

    Char -->|Select| Net
    
    Lobby -->|Leave| Main[Return to Main Menu]

> **💡 Overview:** The **Friend System** enables players to manage social relationships: adding friends, accepting/declining requests, viewing online statuses, and inviting friends to lobbies.

---

## 1. 🏗️ Overview

The Friend System consists of:
-   **FriendsManager:** Backend logic and service calls.
-   **FriendsUI:** The main side-panel displaying the friends list.
-   **FriendListItem:** A single friend entry in the list.
-   **FriendContextMenu:** Right-click popup with actions (Invite, Join, Unfriend).
-   **AddFriends:** Panel for sending/receiving friend requests.

---

## 2. 🖥️ Friends Panel (`FriendsUI.cs`)

**Script:** `FriendsUI.cs`

This is the main friends list panel. It appears as a slide-out UI element.

| **Add Friend Button** | Opens the "Add Friend" popup (Unity Services only). |

### 📱 Visual Elements

-   **Friends Count:** Shows total number of friends.
-   **Invites Count:** Shows pending friend requests (incoming).

Each friend in the list is represented by this UI element.

### 🖱️ User Interactions

| Action | Result |
| :--- | :--- |
| **Click Profile Image** | Opens the friend's profile popup. |
| **Click "More" Button** | Opens the Context Menu. |
| **Right-Click Anywhere** | Opens the Context Menu. |

### 📱 Visual Elements

-   **Friend Name:** Display name.
-   **Profile Image:** Avatar.
-   **Presence Icon:** Color-coded status indicator.
-   **Presence Text:** Shows `Online`, `Offline`, `InLobby`, `InGame`, or `Away`.

### Presence Colors
| Status | Color |
| :--- | :--- |
| Online | 🟢 Green |
| Offline | ⚫ Grey |
| Away | 🔴 Red |
| InLobby | 🟣 Purple |
| InGame | 🔵 Cyan |

---

## 4. 📋 Context Menu (`FriendContextMenu.cs`)

**Script:** `FriendContextMenu.cs`

A popup that appears when right-clicking a friend or clicking "More".

### 🖱️ User Interactions

| Button | Action | Condition |
| :--- | :--- | :--- |
| **Show Profile** | Opens friend's detailed profile popup. | Always available. |
| **Invite to Game** | Sends a lobby invite to the friend. | Only if you are in a lobby AND friend is not Offline. |

## 5. ➕ Add Friends Panel (`AddFriends.cs`)

**Script:** `AddFriends.cs`

A popup for managing friend requests. Only available for **Unity Services** (Steam uses its own overlay).

### 🖱️ User Interactions

1.  **Send Request Tab:**
    -   Type a player's name.
    -   Click "Add Friend" to send a request.
    -   View your outgoing requests below.
2.  **Receive Request Tab:**
    -   View incoming friend requests.
    -   Each request has "Accept" and "Decline" buttons.

### 📱 Visual Elements

-   **Input Field:** Enter the player name to send a request.
-   **Status Text:** Shows success/error messages.
-   **Request List:** List of `FriendRequestItem` entries.

## 6. 🧩 Friends Manager (`FriendsManager.cs`)

**Script:** `FriendsManager.cs`

The backend singleton that handles all friend-related network calls.

### Core Concepts
-   **Singleton:** Accessed via `FriendsManager.Instance`.
-   **Platform Agnostic:** Uses `IFriends` interface (`UnityFriends` or `SteamFriends`).
-   **Events:** UI subscribes to events to update in real-time.

### Events API

| Event | Parameter | Description |
| :--- | :--- | :--- |
| `OnFriendsListUpdated` | `List<Friend>` | Full friends list refreshed. |
| `OnFriendDataUpdated` | `Friend` | A specific friend's data changed. |
| `OnFriendPresenceUpdated` | `(string, FriendPresence)` | A friend's online status changed. |
| `OnFriendRequestReceived` | `FriendRequest` | Someone sent you a friend request. |
| `OnFriendRequestsUpdated` | `void` | Request list changed (accept/decline). |
| `OnLobbyInviteReceived` | `LobbyInvite` | Someone invited you to their lobby. |
| `OnJoinRequestAccepted` | `LobbyInvite` | Your join request was accepted. |
| `OnFriendAdded` | `Friend` | A new friend was added. |
| `OnFriendsAuthenticated` | `void` | Friends system initialized. |

### Key Methods

| Method | Returns | Description |
| :--- | :--- | :--- |
| `GetFriendsList()` | `Task<List<Friend>>` | Fetches the full friends list. |
| `GetFriendRequests()` | `Task<List<FriendRequest>>` | Fetches pending requests. |
| `SendFriendRequest(playerId)` | `Task<bool>` | Sends a request to another player. |
| `AcceptFriendRequest(playerId)` | `Task<bool>` | Accepts an incoming request. |
| `DeclineFriendRequest(playerId)` | `Task<bool>` | Declines an incoming request. |
| `CancelOutgoingRequest(playerId)` | `Task<bool>` | Cancels your sent request. |
| `Unfriend(playerId)` | `Task<bool>` | Removes a friend. |
| `InviteToGame(playerId)` | `Task<bool>` | Sends a lobby invite. |
| `AskToJoin(playerId)` | `Task<bool>` | Requests to join their lobby. |
| `SetPresence(presence)` | `Task` | Updates your online status. |

---

        data-title="Session & Scene Management">
# 🎮 Session & Scene Management

> **💡 Overview:** This document covers the **game start flow**, including the **SessionManager** (handling networked sessions), **LoadingScreen** (visual transitions), and **SpawnManager** (player character spawning).

---

## 1. 🏗️ Overview

When the Host clicks "Start Game", the following flow occurs:

1.  **LobbyManager** sets the `GameId` in lobby data.
2.  **SessionManager** detects the update and starts connecting.
3.  **LoadingScreen** shows progress to the user.
4.  **Host starts Relay/Server**, clients connect.
5.  **Scene loads** via NetworkManager.
6.  **SpawnManager** spawns player characters.
7.  **LoadingScreen** hides when all players are loaded.

---

## 2. 📋 Session Manager (`SessionManager.cs`)

**Script:** `SessionManager.cs`

The SessionManager is a `NetworkBehaviour` that orchestrates the game start flow.

### How It Works

1.  **Listens for `LobbyManager.OnLobbyUpdated`**.
2.  When `LobbyDataKeys.GameId` is set (by the Host), it triggers the connection.
3.  **Host:** Creates the Relay allocation (Unity) or starts Steam server, then calls `NetworkManager.StartHost()`.
4.  **Clients:** Join the Relay/Steam server, then call `NetworkManager.StartClient()`.
5.  **Waits for all players** to connect (with timeout).
6.  **Loads the game scene** via `NetworkManager.SceneManager.LoadScene()`.
7.  When scene load completes, fires `OnAllPlayersLoaded` event.

### Inspector Settings

| Field | Description |
| :--- | :--- |
| `loadAsync` | Load scenes asynchronously (default: false). |
| `waitTime` | Max seconds to wait for players (default: 45). |

### Events API

| Event | Parameter | Description |
| :--- | :--- | :--- |
| `OnAllPlayersLoaded` | `void` | Fired when all players have loaded the scene. |

### Key Properties

| Property | Type | Description |
| :--- | :--- | :--- |
| `SelectedCharacter` | `CharacterData` | The character the local player selected in the lobby. |

### Key Methods

| Method | Description |
| :--- | :--- |
| `LoadNewScene(sceneName)` | Loads a new scene via NetworkManager (Server only). |

---

## 3. ⏳ Loading Screen (`LoadingScreen.cs`)

**Script:** `LoadingScreen.cs`

A simple overlay that shows during transitions.

### 🖱️ No User Interaction
The loading screen is purely visual. Users wait for it to complete.

### 📱 Visual Elements

-   **Status Text:** Shows current status (e.g., "Connecting...", "Waiting for players...").
-   **Progress Bar:** Shows connection/loading progress (0-100%).

### Key Methods

| Method | Parameter | Description |
| :--- | :--- | :--- |
| `ShowLoading(status)` | `string` | Shows the loading screen with initial status. |
| `HideLoading()` | `void` | Fades out and hides the loading screen. |
| `UpdateStatus(status)` | `string` | Updates the status text. |
| `SetProgress(progress)` | `float 0-1` | Sets the progress bar value. |

### How It's Used

1.  **LobbyUI** calls `LoadingScreen.Instance.ShowLoading("Starting game...")` when Start is clicked.
2.  **SessionManager** updates status as connection progresses:
    -   "Connecting to server..."
    -   "Starting host..." / "Joining game..."
    -   "Waiting for players... 2/4"
    -   "Loading game..."
3.  **SessionManager** calls `HideLoading()` when the scene is fully loaded for everyone.

---

## 4. 🧍 Spawn Manager (`SpawnManager.cs`)

**Script:** `SpawnManager.cs`

Handles spawning networked player characters when the game scene loads.

### How It Works

1.  **Placed in the Game Scene** (not in menus).
2.  Has an array of `Transform[] spawnPoints`.
3.  Subscribes to `SessionManager.OnAllPlayersLoaded`.
4.  When triggered, each client sends an RPC to the server with their `CharacterId`.
5.  **Server** instantiates the character prefab at a spawn point and calls `SpawnAsPlayerObject(clientId)`.
6.  When a client disconnects, their character is despawned.

### Inspector Settings

| Field | Description |
| :--- | :--- |
| `spawnPoints` | Array of Transform positions where players spawn. |

### Key Methods

| Method | Description |
| :--- | :--- |
| `SpawnCharacterForClientRpc(clientId, characterId)` | Server RPC to spawn a character for a client. |

### Spawn Point Cycling
Spawn points are used in order. When the last one is used, it cycles back to the first.

---

## 5. 📦 Data Structures

### `CharacterData` (ScriptableObject)
```csharp
public class CharacterData : ScriptableObject
{
    public string CharacterId;
    public string CharacterName;
    public Sprite CharacterIcon;
    public GameObject CharacterPrefab;      // Networked prefab
    public GameObject CharacterLobbyPrefab; // Preview in lobby
    public float Stealth;
    public float Mobility;
}
```

---

## 6. 🛠️ How to Extend

### Adding a Map Selection System
1.  **Lobby:** Add a `MapId` to `LobbyDataKeys` and let the host select a map.
2.  **SessionManager:** In `WaitForPlayersToLoad()`, read the map from lobby data:
    ```csharp
    string mapName = lobbyData.Data[LobbyDataKeys.MapId];
    LoadNewScene(mapName);
    ```
3.  **UI:** Add map selection buttons to `LobbyUI`.

### Adding a Custom Loading Tip
1.  **LoadingScreen:** Add a `TMP_Text tipsText` field.
2.  **Data:** Create a `List<string> loadingTips`.
3.  **Logic:** In `ShowLoading()`, set a random tip:
    ```csharp
    tipsText.text = loadingTips[Random.Range(0, loadingTips.Count)];
    ```

### Adding Respawn Logic
1.  **SpawnManager:** Add a public method `RespawnPlayer(ulong clientId)`.
2.  **Logic:** Destroy the old character, then call `SpawnCharacterForClientRpc` again.
3.  **Trigger:** Call this from your health/damage system when a player dies.

---

## 7. 📐 Visual Flow

```mermaid
graph TD
    Start[Host Clicks Start Game] --> LobbyUpdate[LobbyManager Sets GameId]
    LobbyUpdate --> Session[SessionManager Detects Update]
    
    Session --> LoadShow[LoadingScreen Shows]
    
    Session --> HostCheck{Is Host?}
    HostCheck -- Yes --> Relay[Create Relay/Start Server]
    HostCheck -- No --> Join[Join Relay/Server]
    
    Relay --> StartHost[NetworkManager.StartHost]
    Join --> StartClient[NetworkManager.StartClient]
    
    StartHost --> Wait[Wait for Players]
    Wait --> LoadScene[Load Game Scene]
    
    LoadScene --> SceneComplete[Scene Load Complete]
    SceneComplete --> Spawn[SpawnManager.OnAllPlayersLoaded]
    
    Spawn --> SpawnChars[Spawn Player Characters]
    SpawnChars --> HideLoad[LoadingScreen Hides]
    
    HideLoad --> Gameplay[Gameplay Begins]
```

    </script>

# 🎙️ Voice Chat & General Chat

> **💡 Overview:** This document covers the **Voice Chat** system (mic control, speaker, positional audio) and the **Text Chat** system (sending and receiving messages in a lobby).

---

## 1. 🏗️ Overview

The communication system is split into two parts:

### Voice Chat
-   **VoiceManager:** Backend logic for audio.
-   **VoiceControlUI:** Buttons for mic, speaker, connect/disconnect.
-   **VoiceMemberItem:** Per-player volume and mute controls.

### Text Chat

-   **ChatMessageItem:** A single message bubble.

## 2. 🎙️ Voice Control UI (`VoiceControlUI.cs`)

### 📱 Visual Elements

---

## 3. 👤 Voice Member Item (`VoiceMemberItem.cs`)

Each participant in the voice channel is displayed with individual controls.

### 🖱️ User Interactions

| Control | Action |
| :--- | :--- |
| **Volume Slider** | Adjusts the volume for this specific player. |
| **Mute Button** | Mutes/Unmutes this player locally. |

## 4. 💬 General Chat UI (`GeneralChatUI.cs`)

**Script:** `GeneralChatUI.cs`

The text chat window for in-lobby communication.

### 🖱️ User Interactions

| UI Element | Action |
| :--- | :--- |
| **Input Field** | Type your message here. |
| **Send Button** | Sends the typed message. |
| **Show/Hide Button** | Manually opens full chat with scrollable history. |

### Behavior

-   **Auto-Show:** Chat window fades in for 2 seconds when a new message arrives.
-   **Auto-Hide:** Fades out after the delay if not manually opened.
-   **Manual Open:** Clicking "Show" keeps the chat open with scrollbar until closed.

## 5. 📝 Chat Message Item (`ChatMessageItem.cs`)

**Script:** `ChatMessageItem.cs`

A single chat message in the list.

### 📱 Visual Elements

-   **Message Text:** The actual content.
-   **Background:** Different color for local vs. remote vs. system messages.

### Color Scheme
| Message Type | Name Color | Background |
| :--- | :--- | :--- |
| Local Player | Cyan | Blue-ish |
| Other Player | Gold | Gray |
| System | Orange | Yellow-ish |

---

## 6. 🧩 Voice Manager (`VoiceManager.cs`)

**Script:** `VoiceManager.cs`

The backend singleton for all voice and text chat operations.

### Core Concepts
-   **Singleton:** Accessed via `VoiceManager.Instance`.
-   **Platform Agnostic:** Uses `IVoiceChat` interface (`VivoxServices` or `SteamVoiceServices`).
-   **Auto-Join:** Automatically connects to voice when joining a lobby.
-   **Setting Persistence:** Mic/speaker mute states and volume are saved to `PlayerPrefs`.

### Events API

| Event | Parameter | Description |
| :--- | :--- | :--- |
| `ChannelJoined` | `string channelId` | Voice channel connected. |
| `PositionalChannelJoined` | `string channelId` | Positional voice connected. |
| `ChannelLeft` | `void` | Disconnected from voice. |
| `MembersUpdated` | `List<VoiceMemberSettings>` | Full members list updated. |
| `MemberDataUpdated` | `VoiceMemberSettings` | A specific member's data changed. |
| `MemberSpeaking` | `(string memberId, bool isSpeaking)` | Someone started/stopped talking. |
| `MicStatusUpdated` | `bool isMuted` | Your mic mute state changed. |
| `SpeakerStatusUpdated` | `bool isMuted` | Your speaker mute state changed. |
| `MicVolumeUpdated` | `int volume` | Your mic volume changed. |
| `OnMessageReceived` | `(string senderId, string message)` | A text message arrived. |

### Key Methods

| Method | Description |
| :--- | :--- |
| `JoinVoiceChat(lobbyId)` | Joins the voice channel for a lobby. |
| `JoinPositionalChannel(lobbyId)` | Joins positional (3D) voice for that lobby. |
| `LeaveVoiceChat()` | Disconnects from the current voice channel. |
| `MuteMic()` / `UnmuteMic()` | Mutes/Unmutes your microphone. |
| `MuteSpeaker()` / `UnmuteSpeaker()` | Mutes/Unmutes incoming audio. |
| `SetMicVolume(volume)` | Sets your mic input volume (0-100). |
| `SetMemberVolume(volume, playerId)` | Sets volume for a specific player. |
| `MuteMember(playerId)` / `UnmuteMember(playerId)` | Mutes/Unmutes a specific remote player. |
| `SendTextMessage(message)` | Sends a text message to the channel. |
| `SetVoiceQuality(quality)` | Sets audio quality (Low, Medium, High). |

---

## 7. 📦 Data Structures

### `VoiceMemberSettings`
```csharp
public class VoiceMemberSettings
{
    public string MemberId;
    public int Volume;       // 0-100
    public bool IsMuted;
    public Sprite Sprite;    // Avatar
    public string DisplayName;
}
```

### `VoiceQuality` (Enum)
```csharp
public enum VoiceQuality
{
    Low,    // 8kHz - minimal bandwidth
    Medium, // 16kHz - balanced (default)
    High    // 48kHz - highest quality
}
```

## 8. 🛠️ How to Extend

### Adding Push-to-Talk
1.  **Manager:** Add a `bool isPushToTalk` setting to `VoiceManager`.
2.  **Logic:** In `Update()`, check for a key press (e.g., `V`).
    -   On key down: `UnmuteMic()`.
    -   On key up: `MuteMic()`.
3.  **UI:** Add a toggle in settings to enable/disable push-to-talk mode.

### Adding Private Messages
1.  **IVoiceChat:** Add `SendPrivateMessage(playerId, message)` to the interface.
2.  **Manager:** Expose this as `VoiceManager.Instance.SendPrivateMessage(...)`.
3.  **UI:** Add a "Whisper" button on `FriendContextMenu` that opens a DM input.

### Adding Positional Audio in Gameplay
1.  **Join Positional:** When the game scene loads, call:
    ```csharp
    await VoiceManager.Instance.JoinPositionalChannel(lobbyId);
    ```
2.  **Update Position:** Each frame for networked players, call:
    ```csharp
    voiceChatService.Set3DPosition(playerGameObject);
    ```

# 🎒 Multiplayer Engine - Inventory System

**Data-Driven, Server-Authoritative, & Network-Optimized**

The Inventory System is a highly optimized, server-authoritative inventory architecture designed for competitive and cooperative multiplayer sandbox/survival games. It provides real-time client UI replication, seamless drag-and-drop actions, stack splitting, durability degradation, shooter weapon ammo persistence, and disk/cloud save integration.

Built entirely on top of Unity Netcode for GameObjects using a synchronized `NetworkList`, the inventory system ensures absolute state authority on the server to prevent hacking (such as item duplication or stack size modifications) while maintaining responsive, lag-free visual feedback for clients.

---

## ✨ Features Overview

| Feature | Description |
| :--- | :--- |
| **Server-Authoritative** | All inventory state changes are processed and validated on the server. Clients request actions via Server RPCs. |
| **Network Optimizations** | Utilizes conditional sparse serialization and 16-bit short compression to minimize bandwidth usage. |
| **Unified Quick Slots** | The first 8 slots are designated as Quick Slots (Quickbar) and integrate directly with the character equipment controller. |
| **Split-Drag & Drag-and-Drop** | Seamless left-click dragging to swap/merge stacks and right-click dragging to split stacks in half. |
| **Durability Tracking** | Automatically monitors item wear and tear for tools/weapons, reflecting health bars in the UI and breaking items at 0%. |
| **Ammo State Persistence** | Preserves loaded magazine counts for shooter weapons inside the inventory slot upon unequip or drop. |
| **Sub-Asset Database** | Uses a clean Unity Sub-Asset pattern inside a single `ItemDatabase` ScriptableObject to prevent project clutter. |
| **Persistent Saves** | Saves player inventory status asynchronously to local or cloud storage with automatic 1.5s debounce. |

---

## 📊 Architectural Flow

The diagram below shows the data flow and communication paths between the client UI, server validation, network replication, and storage.

```mermaid
graph TD
    A[Client UI: InventoryUI & QuickSlots] -->|Interact: Drag / Hotkeys / Splitting| B(InventorySlotBase / DropZone)
    B -->|Sends Client Action| C{Client-Server RPCs}
    
    C -->|SwapSlotsRpc| D[InventoryManager Server]
    C -->|SplitStackRpc| D
    C -->|DropItemRpc| D
    C -->|ConsumeItemRpc| D
    
    D -->|Validate & Mutate| E((NetworkList: InventoryItem))
    E -->|OnListChanged| F{Client Sync}
    F -->|LateUpdate UI Refresh| A
    
    D <-->|Get Item Specs| G[(ItemDatabase Sub-Assets)]
    D -->|Equipped Slot Changed| H[EquipmentController]
    D <-->|Debounced Auto-Save & Load| I[SaveGameManager]
    I <-->|Write/Read JSON| J[(Disk / Cloud Storage)]
    
    K[World Pickable] -->|Interacted by Client| L[InteractionController]
    L -->|Request Server Pickup| D
    D -->|TryAddToInventory / TryAddItem| E
```

---

## ⚡ Network Optimizations & Serializations

The inventory system implements advanced networking strategies to keep bandwidth consumption minimal, especially in lobbies with many active players:

### 1. Conditional Serialization (Sparse Slots)
In many survival games, players carry a large number of empty inventory slots. Serializing empty slots is a waste of bandwidth. The `InventoryItem` custom struct handles this with a sparse serialization algorithm:
- When a slot is empty (`itemId == -1`), `NetworkSerialize` **only writes a single 16-bit short** (`itemId`).
- It completely skips writing count, durability, or loaded ammo fields.
- For a standard 20-slot inventory that is half-empty, this cuts serialization overhead in half!

```csharp
public void NetworkSerialize<T>(BufferSerializer<T> serializer) where T : IReaderWriter
{
    short shortItemId = (short)itemId;
    serializer.SerializeValue(ref shortItemId);
    if (serializer.IsReader)
        itemId = shortItemId;

    if (itemId != -1) // Serialize remaining details ONLY if the slot holds an item
    {
        short shortCount = (short)count;
        serializer.SerializeValue(ref shortCount);
        // ... (Serialize durability and loadedAmmo as shorts)
    }
}
```

### 2. 16-Bit Short Value Compression
Rather than serializing variables as full 32-bit integers (`int`), variables (`itemId`, `count`, `durability`, `loadedAmmo`) are temporarily cast and serialized as 16-bit signed shorts (`short`) over the wire. This shrinks the footprint of each active slot from **16 bytes down to just 8 bytes** under the hood.

### 3. Asynchronous Save Debouncing
To prevent disk/cloud write thrashing when a player performs rapid slot changes (e.g. fast-sorting, rapid splitting, or clicking), the inventory manager implements a **1.5-second save debounce timer**:
- When inventory slots change, `OnSlotsChanged` marks the save state as "dirty" (`saveDirty = true`).
- The manager waits for a quiet window of **1.5 seconds** (`SAVE_DEBOUNCE = 1.5f`) before calling the `SaveGameManager` to write updates to disk.

---

## ⚙️ Core Architecture & Scripts

| Script Component | Role & Key Responsibilities |
| :--- | :--- |
| **`InventoryItemData.cs`** | **The Sub-Asset Data:** Defines basic properties, local/network prefabs, offsets, and stats (melee, shooter, tool, consumables). |
| **`ItemDatabase.cs`** | **The Registry:** ScriptableObject listing all items. Editor methods support adding/removing hidden sub-assets inside one file. |
| **`IInventoryManager.cs`** | **The Contract:** Interface decoupling systems like `EquipmentController` and `Interaction` from the specific manager logic. |
| **`InventoryManager.cs`** | **The Controller:** The server-authoritative inventory engine. Syncs slots using `NetworkList<InventoryItem>` and processes RPCs. |
| **`InventorySlotBase.cs`** | **The UI foundation:** Abstract base managing slot selection colors, durability bars, tooltips, and standard drag/drop states. |
| **`InventorySlot.cs`** | **The Bag UI Slot:** Extends base class to fire swap, split, and drag RPC commands. |
| **`InventoryUI.cs`** | **The Main Panel:** Controls visibility of the complete inventory overlay, toggles mouse cursor state, and refreshes slots. |
| **`QuickInventoryUI.cs`** | **The Quickbar Panel:** Renders the active hotbar slots and handles direct hotkey inputs (1-8) to equip/inspect items. |
| **`Pickable.cs`** | **The World Pickup:** Represent dropped items in 3D physical world space. Stores actual quantity, durability, and ammo. |

---

## 🛠️ Developer Setup & Integration

Follow these steps to fully configure the inventory system in your project.

### 1. Database Configuration
1. Select or create an `ItemDatabase.asset` in your project folder (see the Editor Window section below to set this up).
2. Attach it to the **Item Database** field on your player prefab's `InventoryManager` component.

### 2. Player Prefab Components
Your player character prefab must have the following components:
1. `InventoryManager.cs`: Handles all back-end logic, database queries, network replication, and player saves. Set **Max Inventory Size** (default `20`) and **Quick Slot Count** (default `8`).
2. `EquipmentController.cs`: Handles equipping the local and network prefabs of items held in hands.
3. `InteractionController.cs`: Detects surrounding physical world `Pickable` items and initiates server-side pick-up.

### 3. Registering World Pickables
To make an item collectable in 3D space:
1. Create your item model prefab.
2. Attach a collider (marked as a Trigger or standard with rigidbody) and set its layer to `Interactable`.
3. Attach `Pickable.cs`.
4. Link the `InventoryItemData` sub-asset to the **Inventory Item Data** slot.
5. Setup the default amount, durability (-1 for max), and loaded ammo counts.
6. Verify that it has a `NetworkObject` component attached to it, as pickups must be spawned over the network by the server.

---

## 💾 Customizing & Using the Inventory API

If you want to read, edit, or customize the inventory programmatically, you should access it via `IInventoryManager` to remain decoupled. Below are the primary public functions you can call.

### Adding Items

#### `TryAddItem(int itemId, int amount)`
Use this on the **Server Only** to add an item directly by its unique ID (e.g. from loot drops, quest rewards, or cheats). Returns `true` if added.
```csharp
// Example: Add 5 Stone (ID: 3) to the player's inventory
IInventoryManager inv = player.GetComponent<IInventoryManager>();
if (inv.TryAddItem(3, 5)) 
{
    Debug.Log("Stone added successfully.");
}
```

#### `TryAddToInventory(Pickable pickable)`
Use this on the **Server Only** during a physical pick-up interaction. It inspects the `Pickable` components, loads actual current durability or loaded ammo, and distributes the items into empty/stackable slots.
```csharp
// Example: Triggered when interacting with a world pickable
Pickable worldItem = hit.collider.GetComponent<Pickable>();
if (inv.TryAddToInventory(worldItem))
{
    worldItem.Interact(); // Despawns the pickable from the world
}
```

### Inspecting Inventory State

#### `GetTotalCount(int itemId)`
Returns the accumulated count of a specific item ID across all inventory slots (backpack + quickbar).
```csharp
int woodCount = inv.GetTotalCount(1); // Wood ID: 1
if (woodCount >= 10) 
{
    Debug.Log("Ready to craft wood planks!");
}
```

#### `GetItemAt(int index)`
Retrieves the lightweight networked `InventoryItem` struct located in a specific slot.
```csharp
InventoryManager.InventoryItem slotItem = inv.GetItemAt(8); // Slot 8
if (!slotItem.IsEmpty) 
{
    Debug.Log($"Item in slot 8: ID {slotItem.itemId}, Count: {slotItem.count}");
}
```

### Triggering Operations (Server-Side)

These commands can be requested from the client. They call RPCs directly to execute changes securely on the server:

- **Consume/Eat Consumables**:
  `ConsumeItemRpc(int slotIndex, int amount = 1)`
- **Reduce Durability**:
  `ReduceDurabilityRpc(int slotIndex, int damageAmount)`
- **Save ammo magazine state**:
  `SetLoadedAmmoRpc(int slotIndex, int ammo)`
- **Discard/Throw to ground**:
  `DropItemRpc(int slotIndex, int amount = -1)` *(Passing -1 drops the entire slot stack)*
- **Swap / Move Slots**:
  `SwapSlotsRpc(int fromIndex, int toIndex)`
- **Split Stack**:
  `SplitStackRpc(int fromIndex, int toIndex, int amount)`

---

## 🗄️ Using the Item Database Window

Managing all item ScriptableObjects individually can be tedious. The Multiplayer Engine uses a central **Item Database Editor Window** to manage all items as hidden sub-assets inside a single file, eliminating clutter in your folders.

### Accessing the Window
Go to **Tools > Multiplayer Engine > Item Database** in the Unity menu bar.

### Managing Items
1. **Assign DB File**: Click the picker or drag your main `ItemDatabase.asset` into the **DB File** slot at the top left.
2. **Create New Items**: Click the green **Create** button. Select the type of item to create:
   - `Weapon`
   - `Tool`
   - `Consumable`
   - `Resource`
3. **Automatic Sub-Asset Generation**: When you create an item, the editor automatically generates the required nested sub-assets depending on its type:
   - Creating a **Tool** automatically nests a `ToolData` sub-asset.
   - Creating a **Consumable** automatically nests a `ConsumableData` sub-asset.
   - Creating a **Weapon** or **Tool** also automatically links a `HandOffsetData` sub-asset.
4. **Duplicate Items**: Need to make a variant (e.g. Iron Pickaxe ➡️ Steel Pickaxe)? Select the item, click **Duplicate** in the top right, edit its stats, and change its Name & ID.
5. **Import Existing Items**: Have a standalone `InventoryItemData` asset in your project? Click **Import**, select the asset, and the window will copy it directly into your centralized database asset as a clean sub-asset.
6. **Delete Items**: Select an item and click **Delete**. The window handles full cleanup, removing all nested sub-assets (like embedded tool/consumable data) from your disk.

# 🏗️ House Build System

**Robust, Synchronized, & Data-Driven**

The Building System is a high-performance, multiplayer-synchronized architecture designed for sandbox and survival games. It provides real-time ghost previews, smart ray-priority snapping, structural integrity calculations, and automatic state persistence. 

Built entirely on a data-driven networking approach (`NetworkList`), it avoids instantiating individual `NetworkObject`s for every wall or floor, significantly reducing network overhead and keeping massive player bases running smoothly.

---

## ✨ Features Overview

| Feature | Description |
| :--- | :--- |
| **Network Optimization** | Uses a single `NetworkList<BuildPieceData>` to sync states. Late joiners instantly reconstruct the base. |
| **Direct Placement** | Consumes inventory resources immediately upon placement for fast building. |
| **Blueprint Mode** | Places transparent, non-colliding placeholders to be filled with materials later. |
| **Structural Integrity** | Server-side algorithms calculate foundation distance. Destroy a pillar, and watch the cinematic cascading collapse. |
| **Smart Snapping** | Ray-Center Priority snaps to what the player is actually looking at, not just the closest 3D point. |
| **Sub-Asset Database** | Clean project folders! All pieces managed in a single `BuildDatabase` ScriptableObject. |
| **Persistent Saves** | Direct integration with `SaveGameManager` for auto-saving (local/cloud) with AES-256 encryption. |

---

## 🛠️ Full Setup Guide

Follow these steps to integrate the building system into your scene.

### Step 1: Layer Configuration
Ensure your project has the following layers defined:
1. `Ground` (or Terrain)
2. `BuildPiece`

### Step 2: BuildManager Component
1. Create a core system GameObject (or use your existing Network Manager object).
2. Attach the `BuildManager` script.
3. **Assign Layers**: Set `groundLayer` and `buildPieceLayer`.
4. **Assign Materials**: Assign your materials for `validMaterial` (🟩), `invalidMaterial` (🟥), `blueprintMaterial` (🟦), and `outlineMaterial` (hover outlines).
5. **Assign Dependencies**: Link your `BuildDatabase` and `BuildMenuUI`.

### Step 3: Player Equipment (The Hammer)
To build, players need the right tool!
1. Select your Hammer's local prefab (held in the player's hand).
2. Attach the `BuildHammer.cs` script. *This marker component allows the Build Menu to open.*

### Step 4: Creating a Build Piece
1. Create a 3D model in the scene (e.g., a Wall).
2. Attach the `BuildPiece.cs` component.
3. Create child empty GameObjects at the edges and attach `SnapPoint.cs`. Set compatibility (e.g., Face2Face).
4. Assign a `BoxCollider` for overlap detection and standard colliders for physics.
5. Prefab the object. *(Optional: Create a "Ghost" variant without colliders).*
6. Open **Tools > Multiplayer Engine > Build Database**, click **Create**, and assign your prefabs/costs.

---

## ⚙️ Core Architecture & Functions

| Component | Role & Key Functions |
| :--- | :--- |
| **`BuildManager.cs`** | **The Controller:** Handles inputs, ghosts, and netcode.<br>• `UpdateGhostPosition()`: Casts rays, finds snaps, checks overlaps.<br>• `PlacePieceServerRpc()`: Validates, generates IDs, and syncs via NetworkList.<br>• `CascadeDestroyCoroutine()`: Visually destroys collapsed structures. |
| **`BuildPiece.cs`** | **The Block:** Attached to every physical building piece.<br>• `UpdateGhostPrefab()`: Aligns ghost seamlessly using `AlignWithRule()`.<br>• `BuildTile()`: Restores materials and enables physics upon placement. |
| **`BuildSupportGraph.cs`** | **The Physics Brain:** Server-side adjacency graph.<br>• `RegisterPiece()`: Builds the connected node graph.<br>• `OnPieceRemoved()`: Runs BFS to find floating pieces and destroy them. |
| **`SnapPoint.cs`** | **The Connection:** Registers to `SnapPointRegistry` for fast, overlap-free proximity queries. |

---

## 💾 Save & Load Mechanism

The Building System relies seamlessly on `SaveGameManager.cs`.

1. **Auto-Save**: Any placement/destruction flags the `BuildManager` as "dirty". After `autoSaveDelay` (default 5s), it triggers a save.
2. **Serialization**: Data from the `NetworkList` is extracted into lightweight `BuildPieceSaveEntry` structs (ID, Prefab Index, Pos/Rot, Blueprint status, Support Level).
3. **Storage**: Handled via `SaveGameDataAsync("builds")`. Encrypted via AES-256 and saved locally (or synced to Steam/Unity Cloud).
4. **Loading**: `LoadBuildings()` reads the JSON, repopulates the list, and reconstructs the `BuildSupportGraph`.

---

## 🗑️ Cleaning & Destroying

### In-Game Destruction
Players holding a `BuildHammer` can aim at any piece and press the **Delete Build** key. This calls `BuildPiece.DestroyPiece()`, asking the server to remove it.

### Developer Wipe (Cache Clear)
Need a clean slate for testing?
1. Open **Tools > Multiplayer Engine > Build Database**.
2. Click the orange **Clear Build Save Data** button.
3. *Note: If done in Play Mode, it instantly wipes buildings from the live scene too!*

---

## 🗄️ Using the Build Database Window

Manage all your items easily:
1. Open **Tools > Multiplayer Engine > Build Database**.
2. Click **Create** and choose a category (e.g., Foundation, Wall, Roof).
3. Configure the new Sub-Asset in the right panel:
   - **Visuals**: Piece Name & Icon.
   - **Prefabs**: Build Prefab & Ghost Prefab.
   - **Costs**: Add `ResourceCost` elements (e.g., 10x Wood, 5x Stone).
4. Press **Duplicate** to rapidly create variations (e.g., Wooden Wall ➡️ Stone Wall).

---

## 📊 Architectural Flow

```mermaid
graph TD
    A[InputManager] -->|Clicks / Rotates| B(BuildManager)
    B -->|Instantiates| C[BuildPiece Ghost]
    C -->|Queries Nearby| D[SnapPointRegistry]
    C -->|Aligns using| E[SnapPoints]
    
    B -->|Client Request: PlacePieceServerRpc| F((NetworkList: BuildPieceData))
    F -->|OnListChanged| G{Server & Clients}
    G -->|SpawnLocalPiece| H[BuildPiece Solid/Blueprint]
    
    B -->|Server Only: Register| I[BuildSupportGraph]
    I -.->|Cascade Collapse on Remove| B
    
    B <-->|Serialize JSON| J[SaveGameManager]
    J <-->|Local Disk / Cloud| K[(Storage)]
    
    B -->|Prefab Lookup| L[(BuildDatabase Sub-Assets)]
```

---

## 🧩 Implementing Custom Features

Extend the system easily using these approaches:

### Custom Structural Logic (e.g., Material Strength)
Currently, `BuildSupportGraph` adds `+1` cost per connection. To make Stone stronger:
1. Add an `int maxSupportDistance` to `BuildPieceEntry`.
2. Pass material strength into `BuildSupportGraph.RegisterPiece()`.
3. Modify `RecalculateSupportLevel()` to use dynamic weights.

### Custom Alignment / Diagonal Snapping
Want 45-degree angle snaps?
1. Open `BuildPiece.cs`.
2. Find the `AlignWithRule()` method.
3. Add a new `MatchingRule` enum (e.g., `DiagonalFace`).
4. Implement `AlignDiagonal()` using a 45-degree rotational offset applied to the target's forward vector.

### Custom Piece Data (e.g., Ownership / Health)
1. Add a new field (e.g., `ulong ownerClientId`) to `BuildPieceData`. **Must implement `INetworkSerializable`.**
2. Update `PlacePieceServerRpc` to accept and pass this parameter.
3. Update `BuildPieceSaveEntry` for serialization.
4. Apply the new data in `BuildManager.SpawnLocalPiece()`.
