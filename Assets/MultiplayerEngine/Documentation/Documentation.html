# ⚒️ Crafting System

**Data-Driven, Server-Authoritative, & Multiplayer-Synchronized**

The Crafting System is a highly robust, server-authoritative multiplayer crafting architecture designed for cooperative and competitive sandbox/survival games. It provides real-time client UI synchronizations, a single-user interaction lock, dual crafting modes (direct-inventory consumption vs. manual container filling), a floating world-space progress indicator, and spawned item pickup tracking.

Built on top of Unity Netcode for GameObjects using synchronized `NetworkList`s and `NetworkVariable`s, the crafting system ensures absolute state validation on the server to prevent cheating (such as crafting items without sufficient resources) while offering a fluid, immersive 3D world experience.

---

## ✨ Features Overview

| Feature | Description |
| :--- | :--- |
| **Server-Authoritative Validation** | All crafting operations, ingredient checks, and timers are processed exclusively on the server to prevent exploits. |
| **Interaction Locking** | Automatically locks the table UI to one client at a time, displaying an "In Use" status to other players. |
| **Dual Crafting Modes** | Supports **Manual Contribution** (dropping items physically into the table) and **Direct Inventory Crafting** (auto-consuming from inventory). |
| **World-Space Progress Canvas** | Once crafting starts, the player can walk away. A floating 3D progress bar tracks remaining time in the physical game world. |
| **Physical Output Spawning** | Spawns crafted results as physical, network-synchronized items at designated spawn points. |
| **Despawn Tracker Callback** | Uses a tracking component to detect when a spawned item is picked up, hiding the world-space UI cleanly. |
| **Centralized Recipes DB** | Recipes are stored as embedded entries within a single `CraftingRecipeDatabase` ScriptableObject to prevent folder clutter. |
| **Custom Editor Window** | A premium IMGUI editor window for creating, duplicating, and configuring recipes with direct ingredient lookups. |

---

## 📊 Architectural Flow

The diagram below shows the interaction loop between the Player UI, Server RPCs, network state synchronization, physical spawn events, and the recipe database.

```mermaid
graph TD
    A[Player UI: CraftingTableUI] -->|Select Recipe / Drop Ingredients| B(CraftingTable)
    A -->|StartCraftingDirectRpc / StartCraftingRpc| B
    
    B -->|Lock Interacting Client| C((NetworkVariable: interactingPlayerId))
    B -->|Replicate Ingredients State| D((NetworkList: CraftingSlotItem))
    B -->|Replicate Crafting Progress| E((NetworkVariable: craftingProgress))
    B -->|Replicate Active State| F((NetworkVariable: isCrafting))
    
    B -->|Complete: Instantiate & Spawn| G[World Crafted Item NetworkPrefab]
    G -->|Attach Tracker| H[CraftedItemTracker]
    H -->|On Pickup Despawn Callback| B
    
    D & E & F -->|OnValueChanged / OnListChanged| I[Client Sync: CraftingTableUI & WorldProgressUI]
    
    B <-->|Recipes Registry Lookup| J[(CraftingRecipeDatabase Sub-Assets)]
    B <-->|Consume Personal Inventory| K[InventoryManager]
```

---

## ⚡ Multi-User Sync & Optimization Strategies

To maintain structural integrity and a clean gameplay loop in cooperative lobbies, the crafting system integrates several critical multiplayer designs:

### 1. Single-User Interaction Lock
To avoid synchronization race conditions (such as multiple players trying to add ingredients to the same physical table simultaneously), the `CraftingTable` locks itself using a server-authoritative Client ID variable:
- When a client interacts, the server registers the sender's client ID in `interactingPlayerId`.
- The server opens the UI only for that specific client.
- For other players, the table becomes "In Use" and refuses interaction requests until the lock is released (either by the player closing the UI or by the start of a crafting cycle).

### 2. World-Space Crafting Hand-off
Once a player clicks the **Craft** button:
- The server consumes the required ingredients and immediately **releases the interaction lock** (`interactingPlayerId = NO_PLAYER`).
- The player's screen closes the full-screen overlay, freeing them to move, fight, or build.
- The table proceeds to update the floating `CraftingProgressWorldUI` canvas in the 3D scene, which replicates the active state (`isCrafting`) and progress percentage (`craftingProgress` from 0 to 1) to all surrounding players.

### 3. Spawn Tracking & Visual Cleanup
When a craft completes, the item spawns physically in the world as a network pickup. To prevent floating progress labels from lingering, the system attaches a temporary `CraftedItemTracker` component to the spawned prefab. When any player collects the item, the tracker fires a despawn callback back to the crafting table, which cleanly hides the 3D world progress UI.

---

## ⚙️ Core Architecture & Scripts

| Script Component | Role & Key Responsibilities |
| :--- | :--- |
| **`CraftingRecipe.cs`** | **The Blueprint:** Serialized class defining unique ID, name, description, ingredient arrays, output item, and craft time. Also declares the `CraftingSlotItem` Netcode struct. |
| **`CraftingRecipeDatabase.cs`** | **The Registry:** Database asset listing all available recipes. Provides custom methods to filter recipes by object types (weapons, tools, etc.). |
| **`CraftingTable.cs`** | **The Controller:** The server-authoritative crafting engine. Manages stored items inside a `NetworkList`, processes ingredient modifications, runs timers, and handles locks. |
| **`CraftingTableUI.cs`** | **The Screen UI:** Displays search inputs, auto-generates category buttons, lists available recipes, and displays ingredient slot lists. |
| **`CraftingIngredientSlot.cs`** | **The UI Ingredient:** Displays how many resources are required, how many are in the table, and how many are in the player's personal bag. |
| **`CraftingProgressWorldUI.cs`** | **The 3D Floating UI:** A world-space Canvas that displays the progress bar, item icons, and crafting state in physical space. |
| **`RecipeDatabaseWindow.cs`** | **The Custom Editor:** Standardized editor window for rapid recipe creations, duplicated profiles, and custom ingredient configuration. |

---

## 🛠️ Developer Setup & Integration

Follow these steps to integrate a new crafting table into your Unity scene.

### Step 1: Crafting Recipe Database Setup
1. Open the custom editor by navigating to **Tools > Multiplayer Engine > Recipe Database**.
2. Click **Create New Database** (or select your existing `CraftingRecipeDatabase.asset`).
3. Drag your main `ItemDatabase.asset` into the **Item Database Link** slot. This populates dropdown menus with your existing items.
4. Click the green **Create** button to start creating new recipes, configuring their name, required items, output items, and crafting duration.

### Step 2: Creating a Physical Crafting Table
1. Place a 3D model of a workbench in your scene.
2. Attach a Collider and set its layer to `Interactable`.
3. Attach the `CraftingTable.cs` component.
4. **Assign Database**: Link your `CraftingRecipeDatabase` scriptable object.
5. **Assign Spawn Point**: Create an empty child GameObject at the position where you want crafted items to spawn and assign it to the `itemSpawnPoint` slot.
6. Attach a `NetworkObject` component so it replicates.

### Step 3: Setting Up World-Space UI
1. Create a child Canvas on your table prefab, and set its render mode to **World Space**.
2. Scale it down and position it floating roughly 0.5 meters above the table.
3. Attach `CraftingProgressWorldUI.cs`.
4. Configure a background image, progress slider bar, custom text, and result item icon.
5. Drag this component into the `worldProgressUI` field on the main `CraftingTable` component.

---

## 💾 Customizing & Using the Crafting API

Developers can query crafting tables, modify recipes, and interface with the system using these public API hooks:

### Querying Crafting Progress
To check the active state of a workbench or render custom UI indicators:
```csharp
CraftingTable table = hit.collider.GetComponent<CraftingTable>();
if (table.IsCrafting)
{
    float percentage = table.CraftingProgress * 100f;
    Debug.Log($"Crafting in progress: {percentage:F0}%");
}
```

### Stored Container Verification
Query items physically placed in the crafting table's 4 slots:
```csharp
CraftingSlotItem firstSlot = table.GetSlotItem(0);
if (!firstSlot.IsEmpty)
{
    Debug.Log($"Slot 0 contains: Item ID {firstSlot.itemId}, Count: {firstSlot.amount}");
}
```

### Direct Server Commands (Called from Client UI)
If you want to trigger custom crafting panel operations programmatically, use the Server RPCs:

- **Select a active Recipe**:
  `SelectRecipeRpc(int recipeId)`
- **Add Ingredient from player inventory to table container**:
  `AddIngredientRpc(int itemId, int amount)`
- **Remove Ingredient from table container back to player inventory**:
  `RemoveIngredientRpc(int slotIndex, int amount)`
- **Start crafting with direct inventory consumption**:
  `StartCraftingDirectRpc()` *(Consumes from table container first, then pulls remaining items from the player's personal backpack)*

---

## 🗄️ Using the Recipe Database Window

Accessible at **Tools > Multiplayer Engine > Recipe Database**, this custom window makes recipe creation incredibly quick and visual.

### Managing Recipes
1. **Search and Filter**: Search for recipes by name, ID, or output item. Filter recipe lists by ObjectTypes (Weapons, Tools, Consumables).
2. **Create Recipes**: Click the green **Create** button. Assign basic info, descriptions, and optional custom menu icons.
3. **Link with Item Database**: Ensure the **Item Database Link** field points to your active `ItemDatabase.asset`. This automatically generates clean, searchable popup selections for ingredients and results.

# 🌲 Resource Gathering System

**Multiplayer-Synchronized, Server-Authoritative, & Physics-Interactive**

The Resource Gathering System is a high-performance, network-synchronized harvesting architecture designed for cooperative sandbox and survival games. It allows players to cut down trees, mine mineral boulders, and collect raw materials (wood, stone, etc.).

Built on a server-authoritative hybrid model using Unity Netcode for GameObjects, the system leverages a centralized single `ResourceManager` for network traffic, while allowing individual trees and rocks to exist as local, lightweight `MonoBehaviour` instances. This completely eliminates network overhead for thousands of resource nodes across a large map, keeping bandwidth consumption low.

---

## ✨ Features Overview

| Feature | Description |
| :--- | :--- |
| **Server-Authoritative Harvesting** | The server validates node existence, tool tier compatibility, resource types, and stamina before applying harvest damage. |
| **Hybrid Networking Pattern** | A single `ResourceManager` coordinates all network traffic. Node components are purely local, saving memory and RPC traffic. |
| **Auto-Assigned Resource IDs** | Hierarchy selections automatically assign stable, unique IDs to nodes in the editor to ensure seamless client-server matching. |
| **Active Fall Physics** | Trees split into multiple model slots (Trunk, Stump, Fallen Body) and fall physically using custom rigidbody impulses. |
| **Deceleration Settling** | Measures falling tree velocities to detect ground bounces. Spawns drops only after the tree has fully settled. |
| **Trunk-Distributed Drops** | Distributes physical item pickups round-robin across designated spawn points along the fallen tree trunk. |
| **Tier-Locked Resource Levels** | Configurable tier levels (e.g. Iron Pickaxe required for Gold Ore) prevent low-tier tools from breaking premium nodes. |
| **Local Hit Shakes & Particles** | Plays real-time local hit visual effects, shaking animations, and parented decals with zero network lag. |

---

## 📊 Systems Architecture

The diagram below shows the round-trip lifecycle of resource harvesting: from the tool swing animation event, through server validation, to physical fall simulation and drop distribution.

```mermaid
graph TD
    A[Player: Attacks Resource Node] -->|ToolHandler: Swing| B(IHarvestable Detection)
    B -->|Check Tool Specs| C{Meets Requirements?}
    C -->|Yes: Local Raycast Route| D[ResourceManager: RequestDamage]
    
    D -->|RPC: RequestDamageRpc| E[Server authoritative check]
    E -->|1. Validate Node ID exists| E
    E -->|2. Validate expected node type| E
    E -->|3. Validate toolTier >= requiredTier| E
    
    E -->|Subtract Health| F((Server ResourceState))
    F -->|RPC: OnResourceHitRpc| G[Sync Hit Effects on Clients]
    G -->|Play Shake & VFX| H[World Debris Spawn]
    
    F -->|Health <= 0| I[Broadcast OnResourceDestroyedRpc]
    I -->|All Clients| J[Start Fall Physics]
    
    J -->|Wait for Upper Part to stop moving| K[Local TreeResource]
    K -->|RequestDropsAtPositionRpc| D
    D -->|Instantiate Prefabs| L[Physical Wood Drops in World]
```

---

## 🌲 Resource Node Archetypes

The gathering system is divided into two primary node archetypes, illustrating different levels of physics interaction:

### 1. The Rock Mineral Node (`RockResource`)
- **Physics Behavior**: Stationary.
- **Harvest Mechanics**: When hit, it plays a local hit shake and spawns a small stone debris drizzle (`Stone_Hit.prefab`).
- **Destruction**: Upon reaching 0 health, it instantly spawns its configured material drops in a circular spread around the base, plays a loud fracturing sound, and disables its meshes cleanly.

### 2. The Interactive Falling Tree (`TreeResource`)
- **Slot-Based Mesh Architecture**:
  - **Full Tree Slot**: The main visual model displayed while the resource is alive.
  - **Stump Slot**: A small cut stump model that appears at the base once the tree is chopped down.
  - **Upper Part Slot**: The physical fallen body containing a `Rigidbody` (initially kinematic).
- **Physical Fall Impulse**: When chopped, the server calculates the attacker's hit direction (or uses a configured local offset) and applies a physical push force (`fallPushForce`) using `Rigidbody.AddForceAtPosition`. This produces highly realistic tipping and rotational torque.
- **Deceleration Ground Detection**: Rather than relying on heavy physical colliders along the branches (which cause performance lag), the tree measures the upper trunk's deceleration velocity (`impactDecelerationThreshold`). The first contact plays a massive dust puff impact effect, and the second contact signals that the trunk has settled.
- **Delayed Trunk Drops**: Once settled, the tree spawns wood pickups distributed evenly across spawn points located along the fallen trunk, before cleaning up the physics assets.

---

## ⚙️ How to Add a New Resource Node

Follow these steps to integrate a new harvestable resource node (e.g. a "Copper Ore Node"):

### Step 1: Prepare the Node Prefab
1. Import your 3D model.
2. Attach a Collider and set its layer to `Interactable`.
3. Attach `RockResource.cs` or `TreeResource.cs` (or implement `LocalResource.cs` for custom behaviors).
4. Configure parameters:
   - **Required Tier**: Set the minimum tool level needed (e.g. Tier 2 for Copper).
   - **Max Health**: Total health points (e.g. 150 HP).
   - **Resource Drop Config**: Link the item database asset (e.g. `Copper_Ore`) and set the min/max drop amounts.
   - **VFX / Audio**: Link the hit particles, sounds, and destruction effects.

### Step 2: Auto-Assign Resource ID
1. Place your new prefab instances into your Unity Scene.
2. Select the resource node in the hierarchy.
3. The custom editor inspector script will **automatically generate and assign a unique, stable `resourceId`** to the node. 
4. *Important: This ID is used by both the server and client to route damage. Do not modify this value manually.*

### Step 3: Register in the Scene
Verify that the `ResourceManager.cs` component exists on a core system GameObject in your scene. When the game loads, every resource node automatically registers itself with the manager via `Start()`.

---

## 💾 Customizing & Using the Gathering API

Developers can query node stats, customize yields, and interface with the system using these public API hooks:

### Querying Node States
To check resource statuses or display custom UI progress bars:
```csharp
LocalResource node = hit.collider.GetComponent<LocalResource>();
if (node != null && node.IsAlive)
{
    float hpPercent = node.HealthPercentage * 100f;
    Debug.Log($"Resource Node Health: {hpPercent:F0}%");
}
```

### Direct Damage Harvest Requests (Server-Side)
When a harvesting tool collides with a node, it requests damage validation via the `ResourceManager`:
```csharp
// Example: Axe harvests tree node
ResourceManager.Instance.RequestDamage(
    node.ResourceId,
    toolData.harvestDamage,
    hitPoint,
    player.NetworkObjectId,
    HarvestableType.Tree,
    toolData.toolTier
);
```

### Respawn Logic Customization
If you want to create custom respawn cycles for harvested ore blocks or tree stumps:
1. Fetch the destroyed node's stable `resourceId`.
2. Start a Coroutine on the **Server Only**.
3. After a cool-down delay, call the authoritative reset method:
```csharp
// Authoritatively restores health and triggers local model resets
ResourceManager.Instance.ResetResource(resourceId);
```

# ⚔️ Weapons & Tools System

**Physics-Driven, Network-Synchronized, & Surface-Aware**

The Weapons & Tools System is a high-performance, modular combat and harvesting framework designed for multiplayer survival and sandbox games. It supports standard melee weapons with combo-locks, hitscan and physical shooter weapons, charged bows with visual string-drawing, and harvesting tools. 

Built entirely on top of Unity Netcode for GameObjects, the system leverages server-authoritative damage validation, inverse kinematics (IK) bone alignments, continuous capsule blade hitboxes, and an advanced surface-to-out particle/decal impact system.

---

## ✨ Features Overview

| Feature | Description |
| :--- | :--- |
| **Server-Authoritative Combat** | All damage calculations, hits, and stamina consumption are validated on the server. Secure RPCs prevent spoofing. |
| **Continuous Blade Hitbox** | Uses Physics Overlap/CapsuleCasting between handle and tip to track exact edge impacts during animation swings. |
| **Combo Movement Lock** | Melee combo attacks lock player movement. Moving breaks active combinations dynamically. |
| **Charged Bow & String Physics** | Visual string pull offsets and drawing nock states. Releases physical arrows using networked rigidbodies. |
| **IK Support Hand Grips** | Dynamically aligns the player's support hand to the weapon's `secondaryHandGrip` transform using Two-Bone IK. |
| **Resource Tier Validation** | Tools check target `ResourceType` and harvest tier level before dealing resource harvest damage. |
| **Surface-Aware Impact Effects** | Automatically spawns organic blood splats on players, splinters on wood, sparks on metal, and dust on stone. |
| **Decal Parent Tracking** | Attaches impact decals directly to the moving target transform so visual damage follows physics simulations. |

---

## 📊 Systems Architecture

The flow diagram below displays how inputs generate combat animations, trigger hitbox detections, validate server damage, and spawn client-side surface effects.

```mermaid
graph TD
    A[Player Input: Click/Hold] -->|Primary Action| B(Active Handler)
    
    B -->|Melee swing / Tool use| C[MeleeWeaponHandler / ToolHandler]
    B -->|Shoot gun / Draw bow| D[ShooterWeaponHandler / BowWeaponHandler]
    
    C -->|Animation Trigger: OnBladeEnable| E[BladeHitbox Capsule Overlap]
    E -->|Continuous Hit Detect| F{Attacker is Owner?}
    F -->|Yes: Send RPC| G[ApplyMeleeDamageServerRpc]
    
    D -->|Instantiate & Rigidbody Push| H[Network Projectile / Arrow]
    H -->|Collision / Trigger| I[Server Validate Hit]
    
    G & I -->|Server-Authoritative TakeDamage| J[Target: IDamageable]
    J -->|Replicate Health / State| K[All Clients]
    
    G & I -->|Real-Time Spawn| L[Client-Side Impact Particles & Decals]
    L -->|Parent decal to hit transform| M[Target Mesh Moving]
```

---

## ⚔️ The Current Arsenal

The framework ships with three foundational weapons, representing the three core weapon archetypes:

### 1. The Melee Combo Sword (`MeleeWeaponHandler`)
- **Archetype**: Melee Weapon.
- **Hit Detection**: Capsule overlap between two marker transforms: `bladeBase` (hilt) and `bladeTip`. Continuous edge tracing is activated and deactivated via `OnBladeEnable()` and `OnBladeDisable()` animation events on the swing clips.
- **Combo System**: Evaluates combo indexes (0, 1, 2). Attacks apply increasing damage multipliers based on the combo phase. If the player presses the attack button during the "Combo Window", the combo increments. If the player inputs movement directions, the combo is broken, and player movement is unlocked.

### 2. The Firearm Rifle (`ShooterWeaponHandler`)
- **Archetype**: Firearm Weapon.
- **Hit Detection**: Hitscan or physical projectile prefabs spawned at the barrel's `aimReference` transform.
- **State Preservation**: The gun's magazine count (`loadedAmmo`) is preserved directly inside the network-synchronized inventory slot. When unequipped or dropped into the world, the ammo counts persist.
- **Inverse Kinematics**: Aligns the support hand to `secondaryHandGrip` so that the player's hands remain perfectly glued to the weapon model.

### 3. The Recoil Bow (`BowWeaponHandler`)
- **Archetype**: Charged Weapon.
- **Visual String Draw**: The bow string's `stringNockPoint` is pulled backward dynamically in local space according to the current draw timer percentage (0 to 1).
- **Local Hand Arrow**: Spawns a non-networked visual arrow prefab in the drawing hand during the draw phase for visual fidelity.
- **Projectiles**: On release, despawns the local visual arrow and sends a server RPC to instantiate the networked `Projectile.prefab` (the Arrow) using physical rigidbody forces.

---

## ⚙️ How to Add a New Weapon or Tool

Follow this complete step-by-step developer guide to create a new weapon (e.g., a "Fire Axe" tool/melee weapon) from scratch:

### Step 1: Create the Prefabs
Every item requires two separate prefabs:
1. **Local Prefab**: The high-fidelity visual model held in the first-person/third-person player's hands.
   - Attach the visual scripts (`MeleeWeapon.cs` or `ShooterWeapon.cs`).
   - Create empty child transforms:
     - `secondaryHandGrip` for support hand IK target alignment.
     - `aimReference` (barrel tip for guns, nock position for bows).
     - **For melee/tools**: Create `bladeBase` (hilt) and `bladeTip` (blade end) transforms and attach a `BladeHitbox.cs` component, linking these transforms.
2. **Network Prefab**: The physical pickup model dropped on the ground.
   - Must have a `Rigidbody`, a collider, and a `NetworkObject` component.
   - Attach `Pickable.cs` and set its **ObjectType** (Weapon/Tools).
   - Register this prefab in the Unity Netcode **NetworkPrefabs List** on your NetworkManager.

### Step 2: Create the Weapon Data Asset
1. Right-click in your project assets and navigate to **Create > Multiplayer Engine > Inventory > Item Data** (or use the **Item Database Editor Window** at **Tools > Multiplayer Engine > Item Database**).
2. Set basic parameters (ID, Item Name, Sprite Icon, Object Type).
3. Assign your **Local Prefab** and **Network Prefab** slots.
4. Fill out specialized hand positions under **Hand Placement Offset Data**.
5. Configure specific parameters:
   - For **Melee/Tools**: Fill out `MeleeWeaponData` or `ToolData` (swing speeds, stamina cost, damage values per combo, tool tier).
   - For **Guns**: Fill out `ShooterWeaponData` (ammo capacity, reload time, automatic flag, fire rate).

### Step 3: Animation Setup
1. Open your player character animator.
2. Add your weapon's specific attack animation clips to your upper-body combat layer.
3. Open the animation timeline for your attack swings:
   - Add an Animation Event at the swing start frame: Method name: `OnBladeEnable`.
   - Add an Animation Event at the swing end frame: Method name: `OnBladeDisable`.
   - Add an Animation Event at the end of the swing recovery to unlock combos: Method name: `OnAttackExitEnd`.

---

## 🩸 The Authoritative Damage System

The combat loop prioritizes server validation to prevent client-side cheating while using instant local visuals to feel responsive.

### Damage Life Cycle
1. **Detection**:
   - **Melee/Tools**: The local client's animation fires `OnBladeEnable`. `BladeHitbox` performs capsule overlapping. If it collides with a collider on layer `Interactable` or `Player`, it queries `IDamageable`.
   - **Projectiles**: A physical rigidbody projectile collides with a target collider on the server.
2. **RPC Request**:
   - For melee hits, if the attacker is the local client owner, the client fires a secure RPC request to the server: `ApplyMeleeDamageServerRpc(targetNetworkObjectId, damage, hitPoint, hitDirection)`.
3. **Server Validation**:
   - The server validates the attacker's hand range (distance to target) and stamina availability.
   - The server fetches the target's `NetworkObject` via its ID and resolves its `IDamageable` component (like `PlayerStatsManager`).
   - The server calls `.TakeDamage(damageInfo)`, executing health subtraction, death states, and hit reaction animations.
   - Since health is networked, the updated state automatically synchronizes to all other client screens.

---

## 💥 Surface-Aware Particle & Decal Impact System

When a weapon or projectile collides with an object, the system reads the surface material type to emit physical shards outward and place decals.

### 1. Surface Impact Detection
Impacts evaluate target tags, physics materials, or resource components:
- **Player Character Hits**: Triggers a biological impact, querying `PlayerStatsManager.BloodHitEffectPrefab` to spawn arterial blood splats.
- **Resource Node Hits**:
  - `TreeResource` hits read the impact normals and instantiate a wood splinter particle system (`WoodSplintersParticle.mat`).
  - `RockResource` hits emit concrete stone shards (`TinyStonesParticle.mat` / `Stone_Hit.prefab`).
- **Default Hits**: Fall back to generic dust puffs (`DustPuffParticle.mat`) or weapon-specific sparks (`MuzzleFlash.mat`).

### 2. Decal Parent Tracking (Moving Targets)
A common visual bug in survival games is impact decals (like bullet holes or axe slash marks) floating in mid-air when a hit object moves or falls. The Multiplayer Engine solves this with parent tracking:
- When a hit is registered, the client instantiates the particle effect at the exact hit point, aligned with the hit normal (`Quaternion.LookRotation(normal)`).
- The visual effect searches for a child transform marked as a **Decal**.
- The script detaches this decal child from the particle system and **re-parents it directly to the target collider's specific transform** (`child.SetParent(hitTransform, true)`).
- If a cut tree falls or a player runs, the blood splat or wood slash follows the physical mesh correctly!

```csharp
// Example: Spawning hit VFX and parenting decals to moving assets
if (hitVFX != null)
{
    // Instantiate a visual effect copy in world space
    var effect = Instantiate(hitVFX, hitPoint, Quaternion.LookRotation(hitNormal));
    
    // Reparent child decals to the target collider so they follow movements
    foreach (Transform child in effect.transform)
    {
        if (child.name.Contains("Decal"))
        {
            child.SetParent(hitTransform, true);
        }
    }
    
    effect.gameObject.SetActive(true);
    effect.Play();
    Destroy(effect.gameObject, effect.main.duration + 0.5f);
}
```
    </script>

# ❤️ Player Vitals System

**Authoritative Vitals, Responsive Client Prediction, & Smart Health Regen**

The Player Vitals System is a highly optimized, server-authoritative vital statistics manager designed for competitive and cooperative survival games. It manages four core attributes: **Health, Stamina, Food, and Water**, ensuring perfect server replication while utilizing responsive client-side prediction to maintain instant controls.

Built on Unity Netcode for GameObjects using a network-optimized unified struct, the vitals system handles starvation/dehydration damage, automatic state persistence, invincibility stunlock buffers, directional blend tree hit animations, and resource-driven health regeneration.

---

## ✨ Features Overview

| Feature | Description |
| :--- | :--- |
| **Unified Network Struct** | Packs all 8 vital fields into a single `PlayerStats` struct for efficient, low-overhead Netcode replication. |
| **Responsive Client Prediction** | Drains and regenerates stamina locally on the client for instant feel, reconciling with the server authoritative list if values drift. |
| **Decoupled Stamina Manager** | Implements the `IStaminaManager` interface, enabling combat and tool actions to deduct energy instantly. |
| **Metabolic Consumption** | Automatically drains hunger and hydration over time, applying starvation/dehydration damage when empty. |
| **Dynamic Health Regeneration** | regenerates health when food & water are above 75%. Regenerates twice as fast if both are above 90%! |
| **Invincibility Buffers** | Implements a 0.5s invincibility window after a hit to prevent players from getting stuck in animation loops (stunlock). |
| **Directional Hit Reactions** | Converts world impact directions into local 2D coordinates, feeding animator blend trees for realistic impact reactions. |
| **Persistent DB Saves** | Directly syncs player health, food, and water values with the `SaveGameManager` database asynchronously. |

---

## 📊 Vitals Architectural Flow

The diagram below highlights the replication loop, showing how local inputs (like sprinting) execute instant HUD prediction before reconciling with the server authoritative stats.

```mermaid
graph TD
    A[Player Controller Sprint/Combat] -->|Toggles running / Acts| B(Local Stamina Manager)
    B -->|Predictive: Drain locally| C[Client Vitals HUD Refresh]
    B -->|Sync RPC: SyncStaminaToServerRpc| D[PlayerStatsManager Server]
    
    E[Time Update Loop] -->|Drain Food & Water| D
    D -->|Evaluate Food/Water Stats| F{Regen Health?}
    F -->|>90% Both| G[Fast Health Regen: +4 HP/s]
    F -->|>75% Both| H[Normal Health Regen: +2 HP/s]
    F -->|Food/Water at 0| I[Starvation Damage: -1 HP/s]
    
    D <-->|AutoSave & AutoLoad| J[SaveGameManager]
    D -->|Serialize & Replicate| K((NetworkVariable: PlayerStats))
    K -->|OnValueChanged Sync| L{Client Screen}
    L -->|If owner and drift > 10| M[Reconcile Local HUD Vitals]
    L -->|If non-owner| N[Direct HUD Sync]
```

---

## ⚙️ Core Architecture & Scripts

| Script Component | Role & Key Responsibilities |
| :--- | :--- |
| **`PlayerStatsManager.cs`** | **The Vitals Engine:** The server-authoritative manager controlling health, food, and water drains, starvation damage, and saving/loading. |
| **`IPlayerStatsManager.cs`** | **The Vitals Contract:** Interface decoupling player controls, equipment, and consumables from specific stat manager classes. |
| **`StaminaManager.cs`** | **The Energy Controller:** Sub-component managing predictive client-side energy depletion for sprint actions and combat swings. |
| **`PlayerStatsUI.cs`** | **The HUD Panel:** Subscribes to vital changes and interpolates health, stamina, hunger, and hydration progress sliders. |

---

## ⚡ Metabolic Engine & Regeneration Logic

The server handles all metabolic loops. Below is the exact behavior of the vital drains and health regeneration:

### 1. Hunger & Hydration Depletion
- **Hunger (Food)** drains continuously at a rate of **`0.5` points per second** (`foodDrainRate`).
- **Hydration (Water)** drains continuously at a rate of **`0.7` points per second** (`waterDrainRate`).

### 2. Starvation & Dehydration Damage
- If either Food **OR** Water levels drop to **`0`**, the player is starving/dehydrated.
- The server applies damage directly to the health pool at a rate of **`1.0` damage per second** (`starvationDamage`).

### 3. Dynamic Health Regeneration
The player regenerates health naturally from food and water energy. The speed depends on hydration and nutrition levels:
- **Inactive**: If either Food or Water is below **`75%`** (`healthRegenThreshold`), health regeneration is completely disabled.
- **Normal Regeneration**: If both are between **`75%` and `90%`**, health regenerates at **`2.0` health per second** (`healthRegenRate`).
- **Fast Regeneration**: If both Food and Water are above **`90%`** (`healthRegenFastThreshold`), health regenerates at **`4.0` health per second** (`healthRegenRateFast`) to reward well-fed players.

---

## 🛡️ Authoritative Damage & Hit Reacts

The damage pipeline utilizes the `IDamageable` interface and is fully server-controlled, handling reactions with directional calculations:

### 1. Invincibility Frames (Stunlock Guard)
When a hit is registered on the server:
- The server checks if the player took damage within the last **`0.5` seconds** (`invincibilityDuration`).
- If yes, the hit is ignored. This prevents players from being locked in place by consecutive attacks.

### 2. Directional Blend Tree Hit Animations
On hit validation:
- The server calls `PlayHitReactionRpc(Vector3 hitDirection)` on all clients.
- The receiving client translates the world-space `hitDirection` into the player's **Local Space** using `transform.InverseTransformDirection(hitDirection)`.
- This local normal represents a 2D coordinate, which is fed directly into the animator variables `HitDirectionX` and `HitDirectionY`.
- A directional 2D Blend Tree in the animator plays the corresponding animation (e.g. staggering backward if hit from the front, or stumbling forward if hit from behind) for maximum visual realism.

### 3. Authoritative Death & Respawn
- **Death**: If health reaches **`0`**, the server calls `OnDeathRpc()` on all clients. This sets `IsDead` to true, triggers a death ragdoll/animation, and completely disables the `PlayerController` and `CharacterController` scripts to lock movement.
- **Respawn**: When respawning, the server resets stats to default values (`health=100`, `stamina=100`, etc.) and calls `OnRespawnRpc()` to clear death animations and re-enable character controllers.

## 💾 Customizing & Using the Vitals API

Developers can query player stats, modify vitals through consumables, and interact with the system using these public API hooks:

### Querying Vitals
Access the unified `PlayerStats` struct locally or on the server:
```csharp
PlayerStatsManager vitals = player.GetComponent<PlayerStatsManager>();
if (vitals.Stats.health < 30f)
{
    Debug.Log("Warning: Player is in critical condition!");
}
```

### Consuming Food & Water (Called by Consumables)
Consumables (like water bottles or cooked meat) restore vital pools by calling a secure Server RPC:
```csharp
// Example: Cooked meat restores 10 HP, 0 Stamina, 40 Hunger, 5 Hydration
vitals.RestoreStatsRpc(10f, 0f, 40f, 5f);
```

### Sprinting Stamina Depletion (Called by Player Controller)
Sprinting triggers stamina depletion on the client:
```csharp
// Check if player has enough stamina to run
if (vitals.CanRun)
{
    // Toggle running state (drains 10 stamina per second)
    vitals.SetRunning(true);
}
else
{
    vitals.SetRunning(false);
}
```

    <script>
        const navList = document.getElementById('navList');
        const contentDiv = document.getElementById('content');
        const themeSwitch = document.getElementById('themeSwitch');

        // Theme Logic
        const savedTheme = localStorage.getItem('theme') || 'dark';
        document.documentElement.setAttribute('data-theme', savedTheme);
        themeSwitch.checked = savedTheme === 'dark';

        themeSwitch.addEventListener('change', (e) => {
            const theme = e.target.checked ? 'dark' : 'light';
            document.documentElement.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
            loadDoc(activeIndex);
        });

        // Collect Docs from Script Tags
        const docScripts = document.querySelectorAll('script[type="text/markdown"]');
        const docFiles = Array.from(docScripts).map(script => ({
            title: script.getAttribute('data-title'),
            category: script.getAttribute('data-category') || 'Uncategorized',
            content: script.innerHTML.trim() // innerHTML preserves formatting including backticks
        }));

        // Render Nav
        let activeIndex = 0;
        const categoryExpanded = {};

        function renderNav() {
            navList.innerHTML = '';

            // Group by category
            const categories = {};
            docFiles.forEach((doc, index) => {
                if (!categories[doc.category]) {
                    categories[doc.category] = [];
                    // Initialize as collapsed at start
                    if (categoryExpanded[doc.category] === undefined) {
                        categoryExpanded[doc.category] = false;
                    }
                }
                categories[doc.category].push({ doc, index });
            });

            for (const [category, items] of Object.entries(categories)) {
                if (category !== 'Uncategorized') {
                    const header = document.createElement('div');
                    header.className = 'nav-section-header';
                    header.innerHTML = `<span>${category}</span> <span class="nav-section-icon ${categoryExpanded[category] ? 'expanded' : ''}">▶</span>`;

                    header.onclick = () => {
                        categoryExpanded[category] = !categoryExpanded[category];
                        renderNav();
                    };
                    navList.appendChild(header);
                }

                const container = document.createElement('div');
                container.className = `nav-items-container ${categoryExpanded[category] || category === 'Uncategorized' ? 'expanded' : ''}`;

                items.forEach(({ doc, index }) => {
                    const li = document.createElement('li');
                    li.className = `nav-item ${index === activeIndex ? 'active' : ''}`;
                    li.textContent = doc.title;
                    li.onclick = () => loadDoc(index);
                    container.appendChild(li);
                });
                navList.appendChild(container);
            }
        }

        // Load Doc
        function loadDoc(index) {
            activeIndex = index;
            renderNav();
            const docInfo = docFiles[index];
            const currentTheme = document.documentElement.getAttribute('data-theme') || 'dark';

            // Configure Mermaid dynamically
            mermaid.initialize({
                startOnLoad: false,
                theme: currentTheme === 'dark' ? 'dark' : 'default',
                securityLevel: 'loose',
                themeVariables: {
                    fontFamily: "'Inter', sans-serif"
                },
                themeCSS: `
                    /* Node Styles */
                    .node rect, .node circle, .node polygon, .node path {
                        stroke: var(--accent-color) !important;
                        stroke-width: 2.5px !important;
                        fill: var(--code-bg) !important;
                    }
                    /* Edge/Arrow line Styles */
                    .edgePath .path {
                        stroke: var(--accent-color) !important;
                        stroke-width: 3px !important;
                        opacity: 0.9;
                    }
                    /* Arrowhead Styles */
                    .edgePath .markerPath {
                        fill: var(--accent-color) !important;
                        stroke: var(--accent-color) !important;
                        stroke-width: 1px !important;
                    }
                    /* Label Styling */
                    .node .label {
                        font-family: 'Plus Jakarta Sans', sans-serif !important;
                        font-weight: 600 !important;
                        color: var(--text-color) !important;
                    }
                    .edgeLabel rect {
                        fill: var(--bg-color) !important;
                        opacity: 0.95;
                    }
                    .edgeLabel span {
                        font-family: 'Inter', sans-serif !important;
                        font-weight: 600 !important;
                        color: var(--text-color) !important;
                        font-size: 0.8rem !important;
                    }
                    /* Class/Sub-diagram boxes (Clusters) */
                    .cluster rect {
                        fill: var(--sidebar-bg) !important;
                        stroke: var(--border-color) !important;
                        stroke-width: 2.5px !important;
                    }
                    .cluster .label span {
                        font-family: 'Plus Jakarta Sans', sans-serif !important;
                        font-weight: 700 !important;
                        color: var(--text-color) !important;
                        font-size: 0.85rem !important;
                    }
                `
            });

            // We need to decode HTML entities if we used innerHTML (like &lt; for <)
            // But since we are pasting into a script tag, browsers generally treat it as raw text
            // However, just to be safe, we use a textarea hack to decode if needed, 
            // OR simpler: just pass the raw string. Markdown parsers handle it well.

            contentDiv.innerHTML = marked.parse(docInfo.content);

            // Render Mermaid diagrams
            contentDiv.querySelectorAll('pre code.language-mermaid').forEach((block) => {
                const mermaidDiv = document.createElement('div');
                mermaidDiv.className = 'mermaid';
                mermaidDiv.textContent = block.textContent;
                block.parentElement.replaceWith(mermaidDiv);
            });
            mermaid.run();

            window.scrollTo(0, 0);
        }

        // Zoom Modal Logic for Mermaid Diagrams
        document.addEventListener('click', (e) => {
            const mermaidCard = e.target.closest('.mermaid');
            if (mermaidCard && !e.target.closest('.mermaid-modal')) {
                openZoomModal(mermaidCard);
            }
        });

        function openZoomModal(card) {
            const svg = card.querySelector('svg');
            if (!svg) return;

            const modal = document.createElement('div');
            modal.className = 'mermaid-modal';
            modal.innerHTML = `
                <div class="mermaid-modal-backdrop"></div>
                <div class="mermaid-modal-content">
                    <div class="mermaid-modal-close">×</div>
                    <div class="mermaid-modal-controls">
                        <button id="btnZoomIn" title="Zoom In">➕</button>
                        <button id="btnZoomOut" title="Zoom Out">➖</button>
                        <button id="btnZoomReset" title="Reset Zoom">🔄</button>
                    </div>
                    <div class="mermaid-modal-svg-container">
                        ${svg.outerHTML}
                    </div>
                </div>
            `;
            document.body.appendChild(modal);

            const svgEl = modal.querySelector('svg');
            svgEl.removeAttribute('width');
            svgEl.removeAttribute('height');
            svgEl.style.transformOrigin = 'center center';
            svgEl.style.cursor = 'grab';

            let scale = 1;
            let pointX = 0, pointY = 0, startX = 0, startY = 0, isPanning = false;

            function setTransform() {
                svgEl.style.transform = `translate(${pointX}px, ${pointY}px) scale(${scale})`;
            }

            const svgContainer = modal.querySelector('.mermaid-modal-svg-container');

            svgContainer.addEventListener('mousedown', (e) => {
                e.preventDefault();
                startX = e.clientX - pointX;
                startY = e.clientY - pointY;
                isPanning = true;
                svgContainer.style.cursor = 'grabbing';
            });

            window.addEventListener('mousemove', (e) => {
                if (!isPanning) return;
                pointX = e.clientX - startX;
                pointY = e.clientY - startY;
                setTransform();
            });

            window.addEventListener('mouseup', () => {
                isPanning = false;
                svgContainer.style.cursor = 'grab';
            });

            svgContainer.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = e.deltaY;
                const zoomFactor = 0.1;
                
                // Get mouse position relative to container
                const rect = svgContainer.getBoundingClientRect();
                const mouseX = e.clientX - rect.left - rect.width / 2;
                const mouseY = e.clientY - rect.top - rect.height / 2;

                const previousScale = scale;
                if (delta < 0) {
                    scale += zoomFactor;
                } else {
                    scale = Math.max(0.2, scale - zoomFactor);
                }

                // Adjust focus point
                pointX -= mouseX * (scale / previousScale - 1);
                pointY -= mouseY * (scale / previousScale - 1);

                setTransform();
            });

            modal.querySelector('#btnZoomIn').onclick = () => { scale += 0.15; setTransform(); };
            modal.querySelector('#btnZoomOut').onclick = () => { scale = Math.max(0.2, scale - 0.15); setTransform(); };
            modal.querySelector('#btnZoomReset').onclick = () => { scale = 1; pointX = 0; pointY = 0; setTransform(); };

            const closeModal = () => {
                modal.style.opacity = '0';
                setTimeout(() => modal.remove(), 200);
            };

            modal.querySelector('.mermaid-modal-close').onclick = closeModal;
            modal.querySelector('.mermaid-modal-backdrop').onclick = closeModal;

            // Trigger reflow & transition
            setTimeout(() => {
                modal.style.opacity = '1';
            }, 10);
        }

        // Init
        if (docFiles.length > 0) {
            renderNav();
            loadDoc(0);
        }
    </script>
